let activePane='learn', baraSel=0, numLo=1, numHi=20;
function openModule(id){
  if(!CURRENT){ showLogin(); return; }
  const m=MODULES.find(x=>x.id===id); if(!m) return;
  currentModule=m;
  DB.lastMod=id; saveDB();
  const p=prog(); if(!p[m.id]) p[m.id]={seen:{}};
  document.getElementById('home').style.display='none';
  document.getElementById('parentDash').style.display='none';
  document.getElementById('lesson').classList.add('active');
  document.getElementById('lSub').textContent=m.sub+' · '+(STD_TITLES[m.std]||'');
  document.getElementById('lTitle').textContent=m.title;
  document.getElementById('lIntro').textContent=m.intro;
  const note=document.getElementById('lNote');
  if(m.note){ note.textContent=m.note; note.style.display='block'; } else note.style.display='none';
  const pdone=(prog()[m.id]||{}).done;
  document.getElementById('lChest').style.display=(CURRENT&&!pdone)?'block':'none';
  if(m.type==='concept'||m.type==='grammar'){ p[m.id].done=true; saveDB(); }
  baraSel=0; numLo=1; numHi=20;
  buildTabs(); showPane('learn');
  window.scrollTo({top:0});
}
function buildTabs(){
  const m=currentModule; const t=document.getElementById('lTabs');
  const hasQuiz=(m.type!=='concept'&&m.type!=='story'&&m.type!=='exam'&&m.type!=='states');
  const hasEx=(m.type!=='concept'&&m.type!=='story'&&m.type!=='exam'&&m.type!=='states');
  const hasPrint=(m.type==='letters'||m.type==='vocab'||m.type==='barakhadi'||m.type==='numbers');
  let h=`<button class="tab on" data-p="learn" onclick="showPane('learn')">Learn</button>`;
  if(hasEx) h+=`<button class="tab" data-p="ex" onclick="showPane('ex')">Practice · 30</button>`;
  if(hasQuiz) h+=`<button class="tab" data-p="quiz" onclick="showPane('quiz')">Quiz</button>`;
  if(hasPrint) h+=`<button class="tab" data-p="print" onclick="printSheet()">Print worksheet</button>`;
  t.innerHTML=h;
}
function showPane(p){
  activePane=p;
  document.querySelectorAll('#lTabs .tab').forEach(b=>b.classList.toggle('on',b.dataset.p===p));
  document.getElementById('paneLearn').style.display=p==='learn'?'block':'none';
  document.getElementById('paneQuiz').style.display=p==='quiz'?'block':'none';
  document.getElementById('paneEx').style.display=p==='ex'?'block':'none';
  if(p==='learn'){ renderLearn(); hydrateGalleries(); }
  if(p==='quiz') startQuiz();
  if(p==='ex') startPractice();
}
function completeCTA(){
  const m=currentModule, p=prog()[m.id]||{};
  if(p.done) return `<div class="complete-cta"><p>✓ Lesson complete${p.quiz?` · best quiz ${p.quiz}%`:''}</p><button class="btn ghost" onclick="goHome()">Back to course</button></div>`;
  return `<div class="complete-cta"><p>Finished going through this lesson?</p><button class="btn" onclick="markComplete()">Mark as complete ✓</button></div>`;
}
function markComplete(){
  const p=prog(); if(!p[currentModule.id]) p[currentModule.id]={seen:{}};
  const first=!p[currentModule.id].done;
  p[currentModule.id].done=true; saveDB(); renderLearn();
  if(first) lessonChest();
}
function seeItem(i){
  const p=prog(); const id=currentModule.id;
  if(!p[id]) p[id]={seen:{}}; if(!p[id].seen) p[id].seen={};
  p[id].seen[i]=1; saveDB();
}
function renderLearn(){
  const m=currentModule, el=document.getElementById('paneLearn');
  if(m.type==='letters'){
    const data=moduleData(m), seen=(prog()[m.id]||{}).seen||{};
    el.innerHTML=`<div class="lgrid">`+data.map((it,i)=>
      `<button class="lcard" onclick="openDetail(${i})" style="${seen[i]?'border-color:var(--leaf)':''}">
        <span class="g">${it.g}</span><span class="rom">${it.r}</span><span class="en">${it.m}</span></button>`).join('')+`</div>`+completeCTA();
  }
  else if(m.type==='vocab'){
    const data=moduleData(m), seen=(prog()[m.id]||{}).seen||{};
    el.innerHTML=`<div class="wordlist">`+data.map((it,i)=>
      `<button class="word" onclick="openDetail(${i})" style="${seen[i]?'border-color:var(--leaf)':''}">
        <div class="ww">${emo(it.g)?`<span class="wemo">${emo(it.g)}</span> `:''}${it.g}</div><div class="wr">${it.r}</div><div class="wm">${it.m}</div></button>`).join('')+`</div>`+completeCTA();
  }
  else if(m.type==='barakhadi'){ renderBara(el); }
  else if(m.type==='numbers'){ renderNumbers(el); }
  else if(m.type==='states'){ renderStates(el); }
  else if(m.type==='exam'){ renderExam(el); }
  else if(m.type==='story'){ renderStory(el); }
  else if(m.type==='writing'){ renderWriting(el); }
  else if(m.type==='grammar'){
    const g=GRAMMAR[m.gk];
    let rows=g.rows.map(r=>`<tr>`+r.map((c,ci)=>`<td class="${/[\u0A80-\u0AFF]/.test(c)&&ci===0?'g':''}">${c}</td>`).join('')+`</tr>`).join('');
    const gal=g.imgs?`<div class="wgal" data-imgs="${g.imgs}"></div>`:'';
    el.innerHTML=`<div class="lesson-body"><p>${g.intro}</p>${gal}
      <table class="gtable"><thead><tr>${g.head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table>
      ${g.note?`<p style="margin-top:14px"><b>Note:</b> ${g.note}</p>`:''}</div>`+completeCTA();
  }
  else if(m.type==='concept'){
    el.innerHTML=`<div class="lesson-body">${CONCEPT[m.ck].html}</div>`+completeCTA();
  }
}
function renderBara(el){
  const seen=(prog()[currentModule.id]||{}).seen||{};

    `<button class="cbtn${i===baraSel?' on':''}${seen[i]?'':''}" style="${seen[i]&&i!==baraSel?'border-color:var(--leaf)':''}" onclick="selectCons(${i})">${c}</button>`).join('')+`</div>`;

  let grid=`<div class="lgrid">`+row.map((it,i)=>

  el.innerHTML=picker+grid+`<p style="margin-top:14px;color:var(--ink-soft);font-size:14px">Viewed rows: <b>${Object.keys(seen).length} / ${BCONS.length}</b> — open every letter's row to finish this lesson.</p>`+completeCTA();

const NUM_RANGES=[[1,20],[21,50],[51,100],[101,200],[201,300],[301,400],[401,500],[501,600],[601,700],[701,800],[801,900],[901,1000]];
function renderNumbers(el){
  let tabs=`<div class="range-tabs">`+NUM_RANGES.map(([lo,hi])=>
    `<button class="rtab${lo===numLo?' on':''}" onclick="showRange(${lo},${hi})">${lo}–${hi}</button>`).join('')+`</div>`;
  let cards=`<div class="lgrid">`;
  for(let n=numLo;n<=numHi;n++){
    cards+=`<button class="lcard" onclick="openNum(${n})">
      <span class="g">${gujNum(n)}</span><span class="rom" style="font-family:var(--guj);font-size:17px">${numWord(n)}</span><span class="en">${numRom(n)} · ${n}</span></button>`;
  }
  cards+=`</div>`;
  el.innerHTML=tabs+cards+`<p style="margin-top:14px;color:var(--ink-soft);font-size:14px">Beyond 1,000: <span style="font-family:var(--guj)">હજાર</span> (thousand), <span style="font-family:var(--guj)">લાખ</span> (100,000), <span style="font-family:var(--guj)">કરોડ</span> (10,000,000). E.g. 2,500 = <span style="font-family:var(--guj)">બે હજાર પાંચસો</span>.</p>`+completeCTA();
}
function showRange(lo,hi){
  numLo=lo; numHi=hi;
  const idx=NUM_RANGES.findIndex(r=>r[0]===lo); seeItem(idx);
  const p=prog()[currentModule.id];
  if(p&&p.seen&&Object.keys(p.seen).length>=NUM_RANGES.length){ p.done=true; saveDB(); }
  renderNumbers(document.getElementById('paneLearn'));
}

const WIKICACHE={}; let WIKI_API_FAIL=0, WIKI_IMG_FAIL=0;
function fetchT(url,ms){
  return new Promise((res)=>{
    const ctl=('AbortController' in window)?new AbortController():null;
    const timer=setTimeout(()=>{ try{ctl&&ctl.abort();}catch(e){} res(null); }, ms||8000);
    fetch(url, ctl?{signal:ctl.signal}:{})
      .then(r=>{ clearTimeout(timer); res(r&&r.ok?r:null); })
      .catch(()=>{ clearTimeout(timer); res(null); });
  });
}
async function tryActionApi(host,title){
  const r=await fetchT('https://'+host+'/w/api.php?action=query&format=json&origin=*&prop=pageimages&piprop=thumbnail&pithumbsize=560&redirects=1&titles='+encodeURIComponent(title),8000);
  if(!r) return null;
  try{ const j=await r.json(); const pgs=j&&j.query&&j.query.pages;
    if(!pgs) return null;
    const pg=pgs[Object.keys(pgs)[0]];
    return (pg&&pg.thumbnail&&pg.thumbnail.source)||null;
  }catch(e){ return null; }
}
async function wikiThumb(title){
  if(WIKICACHE[title]) return WIKICACHE[title];
  try{ const c=localStorage.getItem('wimg4:'+title); if(c){ WIKICACHE[title]=c; return c; } }catch(e){}
  let u=await tryActionApi('en.wikipedia.org',title);          /* route 1: main API */
  if(!u) u=await tryActionApi('en.m.wikipedia.org',title);     /* route 2: mobile host — often unfiltered */
  if(!u){                                                       /* route 3: REST summary */
    const r=await fetchT('https://en.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent(title),8000);
    if(r){ try{ const j=await r.json();
      u=(j.thumbnail&&j.thumbnail.source)||(j.originalimage&&j.originalimage.source)||null; }catch(e){} }
  }
  if(!u){ WIKI_API_FAIL++; return null; }
  WIKICACHE[title]=u;
  try{ localStorage.setItem('wimg4:'+title,u); }catch(e){}
  return u;
}
function proxied(u){ return 'https://images.weserv.nl/?url='+encodeURIComponent(u.replace(/^https?:\/\//,''))+'&w=560'; }

function hydrateGalleries(root){
  (root||document).querySelectorAll('.wgal:not(.done)').forEach(gal=>{
    gal.classList.add('done');
    const items=gal.dataset.imgs.split('|');
    let okCount=0, doneCount=0;
    const note=document.createElement('p'); note.className='wgal-note';
    note.textContent='📷 Loading real photos from Wikipedia…';
    gal.insertAdjacentElement('afterend',note);
    const settle=()=>{ doneCount++;
      if(doneCount===items.length){
        if(okCount) note.textContent='📷 Real photos from Wikipedia (free-licensed).';
        else if(WIKI_API_FAIL&&!WIKI_IMG_FAIL) note.textContent='📷 This network is silently dropping requests to Wikipedia data services (tried 3 routes). Photos will appear on another network — test once on a phone hotspot. Check tablet Settings → Connections → Private DNS, and any ad-block/parental filter on the router.';
        else if(WIKI_IMG_FAIL) note.textContent='📷 The photo server (upload.wikimedia.org) seems blocked on this network — even via backup route.';
        else note.textContent='📷 Photos could not load — check the internet connection.';
      }};
    items.forEach(spec=>{
      const [title,cap]=spec.split('~');
      const fig=document.createElement('figure');
      fig.className='wfig';
      fig.innerHTML=`<div class="wimg-ph">📷</div><figcaption>${cap||title.replace(/_/g,' ')}</figcaption>`;
      gal.appendChild(fig);
      wikiThumb(title).then(u=>{
        if(!u){ fig.remove(); settle(); return; }
        const img=new Image();
        let triedProxy=false;
        img.onload=()=>{ fig.querySelector('.wimg-ph').replaceWith(img); okCount++; settle(); };
        img.onerror=()=>{
          if(!triedProxy){ triedProxy=true; img.src=proxied(u); return; }
          WIKI_IMG_FAIL++; fig.remove(); settle();
        };
        img.alt=cap||title; img.className='wimg';
        img.src=u;
      });
    });
  });
}

/* ---- typed writing checker: word-by-word comparison with the model ---- */
function normG(t){ return t.replace(/[।.,!?]/g,'').replace(/\s+/g,' ').trim(); }
function checkWriting(i){
  const w=WRITING[currentModule.wk], pr=w.prompts[i];
  const inp=document.getElementById('win'+i), fb=document.getElementById('wfb'+i);
  const mine=normG(inp.value||'');
  if(!mine){ fb.innerHTML='<span class="bad">Type your Gujarati sentence first. Tip: add the Gujarati keyboard in your tablet settings (Gboard → Languages → ગુજરાતી).</span>'; return; }
  const target=normG(pr.a);
  const tw=target.split(' '), mw=mine.split(' ');
  const used=new Array(tw.length).fill(false);
  let correct=0;
  const marked=mw.map(word=>{
    const idx=tw.findIndex((t,j)=>!used[j]&&t===word);
    if(idx>-1){ used[idx]=true; correct++; return '<span class="okw">'+word+'</span>'; }
    return '<span class="badw">'+word+'</span>';
  }).join(' ');
  const missing=tw.filter((t,j)=>!used[j]);
  const pct=Math.round(100*correct/tw.length);
  let verdict, pts=0;
  if(mine===target){ verdict='🌟 સંપૂર્ણ સાચું! Perfect — 100/100'; pts=5; }
  else if(pct>=80){ verdict='👍 લગભગ સાચું! '+pct+'/100 — check the red words'; pts=3; }
  else if(pct>=50){ verdict='✏️ સારો પ્રયત્ન — '+pct+'/100. Compare with the answer below.'; pts=1; }
  else verdict='Try again — build it as કોણ + શું + ક્રિયા, or peek at the answer and copy it once.';
  if(pts) awardPts(pts,'write');
  fb.innerHTML='<div class="wfb-line">'+marked+'</div>'+
    (missing.length?'<div class="wfb-miss">Missing: <span class="wp-g">'+missing.join(', ')+'</span></div>':'')+
    '<div class="wfb-verdict">'+verdict+(pts?' · +'+pts+' ⭐':'')+'</div>';
}

let padCtx=null, padGlyph='', drawing=false, padW=0, padH=0, padId='pad', padTouched=false, strokePts=[];
function initPad(glyph,id){
  padId=id||'pad';
  const c=document.getElementById(padId); if(!c) return;
  padGlyph=glyph; padTouched=false;
  const w=(c.parentElement.clientWidth||300);
  /* single letter → tall square; word → wide strip; sentence → wider strip */
  const chars=[...glyph].length;
  const ratio = chars<=2 ? 0.9 : chars<=8 ? 0.5 : 0.38;
  const h=Math.max(150, Math.round(w*ratio));
  const dpr=window.devicePixelRatio||1;
  c.width=Math.round(w*dpr); c.height=Math.round(h*dpr);
  c.style.width=w+'px'; c.style.height=h+'px';
  padCtx=c.getContext('2d'); padCtx.setTransform(dpr,0,0,dpr,0,0);
  padW=w; padH=h; strokePts=[];
  drawGuide();
  /* redraw once the Gujarati font is actually loaded (fixes blank/box glyphs) */
  if(document.fonts&&document.fonts.ready) document.fonts.ready.then(()=>{ if(padGlyph===glyph&&!drawing) drawGuide(); });
  const pos=e=>{ const r=c.getBoundingClientRect(); return [e.clientX-r.left, e.clientY-r.top]; };
  c.onpointerdown=e=>{ e.preventDefault(); drawing=true; padTouched=true;
    try{c.setPointerCapture(e.pointerId);}catch(_){}
    const [x,y]=pos(e); strokePts.push([x,y]); padCtx.beginPath(); padCtx.moveTo(x,y); };
  c.onpointermove=e=>{ if(!drawing) return; e.preventDefault();
    const [x,y]=pos(e); strokePts.push([x,y]); padCtx.lineTo(x,y);
    padCtx.strokeStyle='#23264a'; padCtx.lineWidth=Math.max(4,Math.round(w/72));
    padCtx.lineCap='round'; padCtx.lineJoin='round'; padCtx.stroke(); };
  c.onpointerup=()=>drawing=false; c.onpointercancel=()=>drawing=false;
}
function drawGuide(){
  if(!padCtx) return;
  padCtx.clearRect(0,0,padW,padH);
  padCtx.save();
  /* faint mid guide line */
  padCtx.strokeStyle='rgba(35,38,74,.07)'; padCtx.lineWidth=1;
  padCtx.beginPath(); padCtx.moveTo(12,padH/2); padCtx.lineTo(padW-12,padH/2); padCtx.stroke();
  if(!padGlyph){ /* free-writing mode: ruled lines only */
    padCtx.strokeStyle='rgba(35,38,74,.10)'; padCtx.lineWidth=1;
    [0.33,0.66].forEach(f=>{ padCtx.beginPath(); padCtx.moveTo(12,padH*f); padCtx.lineTo(padW-12,padH*f); padCtx.stroke(); });
    padCtx.restore(); return;
  }
  /* fit the glyph to the pad width so long words & sentences stay big and traceable */
  padCtx.fillStyle='rgba(35,38,74,.13)';
  padCtx.textAlign='center'; padCtx.textBaseline='middle';
  let size=Math.round(padH*0.7);
  while(size>16){
    padCtx.font='600 '+size+'px "Noto Sans Gujarati"';
    if(padCtx.measureText(padGlyph).width <= padW*0.92) break;
    size-=3;
  }
  padCtx.fillText(padGlyph, padW/2, padH/2 + size*0.06);
  padCtx.restore();
}
function clearPad(){ if(padCtx){ strokePts=[]; padTouched=false; drawGuide(); } }
window.addEventListener('resize',()=>{ if(document.getElementById('scrim').classList.contains('show')&&padGlyph) initPad(padGlyph,padId); });
/* ---- AI trace checker: compares your strokes with the letter shape ---- */
function scoreTrace(){
  if(!padGlyph||!strokePts.length) return null;
  const off=document.createElement('canvas'); off.width=padW; off.height=padH;
  const g=off.getContext('2d');
  g.fillStyle='#000'; g.textAlign='center'; g.textBaseline='middle';
  let size=Math.round(padH*0.7);
  while(size>16){ g.font='600 '+size+'px "Noto Sans Gujarati"'; if(g.measureText(padGlyph).width<=padW*0.92) break; size-=3; }
  g.fillText(padGlyph,padW/2,padH/2+size*0.06);
  const img=g.getImageData(0,0,padW,padH).data;
  const cell=4, gw=Math.ceil(padW/cell), gh=Math.ceil(padH/cell);
  const glyphCells=new Uint8Array(gw*gh);
  for(let y=0;y<padH;y+=2) for(let x=0;x<padW;x+=2){
    if(img[(y*padW+x)*4+3]>60) glyphCells[Math.floor(y/cell)*gw+Math.floor(x/cell)]=1;
  }
  const R=2; const strokeCells=new Uint8Array(gw*gh);
  strokePts.forEach(([x,y])=>{
    const cx=Math.floor(x/cell), cy=Math.floor(y/cell);
    for(let dy=-R;dy<=R;dy++) for(let dx=-R;dx<=R;dx++){
      const nx=cx+dx, ny=cy+dy;
      if(nx>=0&&ny>=0&&nx<gw&&ny<gh) strokeCells[ny*gw+nx]=1;
    }
  });
  let gTot=0,gCov=0,sTot=0,sStray=0;
  for(let i=0;i<gw*gh;i++){
    if(glyphCells[i]){ gTot++; if(strokeCells[i]) gCov++; }
    if(strokeCells[i]){ sTot++; if(!glyphCells[i]) sStray++; }
  }
  if(!gTot||!sTot) return null;
  const coverage=gCov/gTot, stray=sStray/sTot;
  const score=Math.max(0,Math.round(100*coverage-35*Math.max(0,stray-0.45)*100/100));
  return {score:Math.min(100,score), coverage:Math.round(coverage*100), stray:Math.round(stray*100)};
}
function checkTrace(){
  const r=scoreTrace();
  if(!r){ toast('Trace the letter first, then check.'); return; }
  let msg,good=false;
  if(r.score>=80){ msg='🌟 શાબાશ! '+r.score+'/100 — beautiful tracing! +3 ⭐'; good=true; }
  else if(r.score>=55){ msg='👍 સરસ! '+r.score+'/100 — good, try to cover the whole letter. +1 ⭐'; }
  else { msg='✏️ '+r.score+'/100 — go slower and stay on the grey letter. Try again!'; }
  if(r.score>=80) awardPts(3,'trace'); else if(r.score>=55) awardPts(1,'trace');
  toast(msg,4200);
  return r;
}

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
const QUIZ_LEN=30;
function startQuiz(){
  qIdx=0; qScore=0; renderQuiz();
}
function renderQuiz(){
  const el=document.getElementById('paneQuiz');
  if(qIdx>=QUIZ_LEN){ renderQuizDone(el); return; }
  const m=currentModule;
  const it=exItem(m);
  const flip=Math.random()<0.5;
  const xf=(m.type==='letters'||m.type==='barakhadi')?'r':'m';
  const label = flip ? (m.type==='numbers'?'Which number is this?':(xf==='r'?'Which sound is this?':'What does this mean?'))
                     : `Which one is <b>${it[xf]}</b>?`;
  const field=flip?xf:'g';
  const opts=shuffle([it[field], ...exDistract(m,it,field)]);
  el.innerHTML=`<div class="quiz">
    <div class="q-top"><span class="q-count">${qIdx+1} / ${QUIZ_LEN}</span>
      <div class="q-bar"><i style="width:${Math.round(100*qIdx/QUIZ_LEN)}%"></i></div></div>
    <div class="prompt"><div class="label">${label}</div>
      ${flip?`<div class="bigq${it.g.length>4?' small':''}">${it.g}</div>`:''}</div>
    <div class="opts">${opts.map(o=>
      `<button class="opt" ${!flip?'style="font-family:var(--guj);font-size:19px"':''} data-ok="${o===it[field]?1:0}" onclick="answerQ(this)">${o}</button>`).join('')}</div>
  </div>`;
}
function answerQ(btn){
  if(qLock) return; qLock=true;
  const ok=btn.dataset.ok==='1';
  btn.classList.add(ok?'right':'wrong');
  if(ok) qScore++;
  setTimeout(()=>{ qLock=false; qIdx++; renderQuiz(); }, ok?500:1050);
}
function answer(btn,chosen,correct){
  if(qLock) return; qLock=true;
  const ok=chosen===correct;
  btn.classList.add(ok?'right':'wrong');
  if(ok) qScore++;
  setTimeout(()=>{ qLock=false; qIdx++; renderQuiz(); }, ok?550:1100);
}
function renderQuizDone(el){
  const pct=Math.round(100*qScore/QUIZ_LEN);
  const p=prog(); const id=currentModule.id;
  if(!p[id]) p[id]={seen:{}};
  if(!p[id].quiz||pct>p[id].quiz) p[id].quiz=pct;
  const firstPass=pct>=70&&!p[id].done;
  if(pct>=70) p[id].done=true;
  saveDB();
  if(firstPass){ awardPts(15,'quiz'); lessonChest(); }
  el.innerHTML=`<div class="quiz quiz-done">
    <div class="score">${pct}%</div>
    <p>${pct>=70?'લેસન પૂરું! Lesson complete ✓':'Good try — 70% marks it complete. Go again!'}</p>
    <button class="btn" onclick="startQuiz()">Try again</button>
    <button class="btn ghost" onclick="goHome()" style="margin-left:8px">Back to course</button>
  </div>`;
}

/* =========================================================
   8b) PRACTICE - 100-exercise goal per lesson
   ========================================================= */
let EX=null;
function rnd(n){ return Math.floor(Math.random()*n); }
function pick(arr){ return arr[rnd(arr.length)]; }
function exCount(){ const p=prog()[currentModule.id]||{}; return p.ex||0; }
function exItem(m){
  if(m.type==='barakhadi'){ const ci=rnd(BCONS.length); const row=baraRow(ci); const it=pick(row); return {g:it.g,r:it.r,m:'syllable of '+BCONS[ci][0]}; }
  if(m.type==='numbers'){
    const w=Math.random(); const n= w<.5? 1+rnd(100) : w<.8? 101+rnd(400) : 501+rnd(500);
    return {g:gujNum(n), r:numWord(n), m:String(n), say:numWord(n), n:n};
  }
  if(m.type==='grammar'){
    if(m.ds&&Math.random()<0.6) return pick(DATASETS[m.ds]);
    const g=GRAMMAR[m.gk]; const row=pick(g.rows); return {g:row[0], r:row[1]||'', m:row[row.length-1]};
  }
  return pick(moduleData(m));
}
function exDistract(m,it,field){
  const out=new Set(); let guard=0;
  while(out.size<3&&guard<80){
    guard++; const o=exItem(m);
    if(o[field]!==it[field]&&o.g!==it.g) out.add(o[field]);
  }
  return [...out];
}
function genExercise(m){
  const it=exItem(m);
  let kinds;
  if(m.type==='grammar') kinds=['g2x','x2g'];
  else kinds=['g2x','x2g','audio','trace','trace'];
  const words=it.g.replace(/[।.!?,]/g,'').trim().split(/\s+/);
  if(words.length>=3&&words.length<=9) kinds=kinds.concat(['order','cloze','cloze','wcloze','wcloze']);
  if(EMOJI[it.g]) kinds=kinds.concat(['pic','pic']);
  const kind=pick(kinds);
  const xField=(m.type==='vocab'||m.type==='numbers'||m.type==='grammar'||m.type==='writing')?'m':'r';
  return {kind,it,xField,words};
}
function startPractice(){ exNew(); }
function exNew(){ EX=genExercise(currentModule); renderEx(); }
function exHead(){
  const c=Math.min(exCount(),30);
  return `<div class="q-top"><span class="q-count">Practice: <b>${c}</b> / 30 ${c>=30?'✓ done!':''}</span>
    <div class="q-bar"><i style="width:${Math.round(c*100/30)}%"></i></div></div>`;
}
function renderEx(){
  const el=document.getElementById('paneEx'); if(!EX){ el.innerHTML=''; return; }
  const m=currentModule, it=EX.it, xf=EX.xField;
  const say=(it.say||it.g).replace(/'/g,"\\'");
  let body='';
  if(EX.kind==='trace'){
    body=`<div class="prompt"><div class="label">Trace this - say it out loud as you write</div>
      <div class="bigq${it.g.length>4?' small':''}">${it.g}</div>
      <div style="margin:4px 0 10px"><button class="speak" onclick="speak('${say}')">&#128266; Hear it</button>
      <span style="font-size:14px;color:var(--ink-soft);margin-left:8px">${it.r}${it.m?' - '+it.m:''}</span></div></div>
      <div class="trace-wrap"><h4>Trace pad <button onclick="clearPad()">Clear</button></h4>
      <canvas class="pad" id="expad"></canvas></div>
      <div style="margin-top:12px;text-align:center"><button class="btn" onclick="exTraceDone()">Done - next &#10132;</button></div>`;
  }else if(EX.kind==='order'){
    EX.sel=[];
    const shuffled=shuffle(EX.words.map((w,idx)=>({w,idx})));
    body=`<div class="prompt"><div class="label">Build the sentence — tap the words in order</div>
      <div style="font-size:14px;color:var(--ink-soft);margin:4px 0 8px">${it.m||''}</div>
      <div class="ord-out" id="ordOut">&nbsp;</div></div>
      <div class="opts ord-opts">${shuffled.map(o=>`<button class="opt ordw" data-idx="${o.idx}" onclick="ordPick(this)" style="font-family:var(--guj);font-size:18px">${o.w}</button>`).join('')}</div>
      <div style="text-align:center;margin-top:10px"><button class="btn ghost small" onclick="renderEx()">↺ Restart</button>
      <button class="speak" style="margin-left:8px" onclick="speak('${say}')">🔊 Hear it</button></div>`;
  }else if(EX.kind==='wcloze'){
    const hideIdx=1+rnd(Math.max(1,EX.words.length-1));
    EX.hideWord=EX.words[hideIdx];
    const blanked=EX.words.map((w,idx)=>idx===hideIdx?'<span class="blank">______</span>':w).join(' ');
    body=`<div class="prompt"><div class="label">✍️ Write the missing word (fill in the blank)</div>
      <div class="bigq small" style="font-size:22px;line-height:1.7">${blanked}</div>
      <div style="font-size:13.5px;color:var(--ink-soft)">${it.m||''}</div></div>
      <div class="wcheck" style="max-width:420px;margin:0 auto"><input type="text" id="wclozeIn" lang="gu" placeholder="ગુજરાતીમાં લખો…" onkeydown="if(event.key==='Enter')wclozeCheck()">
      <button class="btn small" onclick="wclozeCheck()">✓ Check</button></div>
      <div class="wfb" id="wclozeFb" style="text-align:center;margin-top:8px"></div>
      <div style="text-align:center;margin-top:6px"><button class="btn ghost small" onclick="wclozeReveal()">Show word</button>
      <button class="speak" style="margin-left:8px" onclick="speak('${say}')">🔊 Hear the sentence</button></div>`;
  }else if(EX.kind==='pic'){
    const opts=shuffle([it.g].concat(exDistract(m,it,'g')));
    body=`<div class="prompt"><div class="label">🖼️ Look at the picture — which word is it?</div>
      <div style="font-size:76px;margin:8px 0">${EMOJI[it.g]}</div></div>
      <div class="opts">${opts.map(o=>`<button class="opt" style="font-family:var(--guj);font-size:20px" data-ok="${o===it.g?1:0}" onclick="exPick(this)">${o}</button>`).join('')}</div>`;
  }else if(EX.kind==='cloze'){
    const hideIdx=1+rnd(Math.max(1,EX.words.length-1));
    EX.hideWord=EX.words[hideIdx];
    const blanked=EX.words.map((w,idx)=>idx===hideIdx?'____':w).join(' ');
    const others=new Set(); let guard=0;
    while(others.size<3&&guard<60){ guard++;
      const o=exItem(m); const ws=o.g.replace(/[।.!?,]/g,'').trim().split(/\s+/);
      const cand=pick(ws); if(cand!==EX.hideWord&&cand.length>1) others.add(cand);
    }
    const opts=shuffle([EX.hideWord].concat([...others]));
    body=`<div class="prompt"><div class="label">Fill in the blank</div>
      <div class="bigq small" style="font-size:22px;line-height:1.7">${blanked}</div>
      <div style="font-size:13.5px;color:var(--ink-soft)">${it.m||''}</div></div>
      <div class="opts">${opts.map(o=>`<button class="opt" style="font-family:var(--guj);font-size:19px" data-ok="${o===EX.hideWord?1:0}" onclick="exPick(this)">${o}</button>`).join('')}</div>`;
  }else if(EX.kind==='audio'){
    const opts=shuffle([it.g].concat(exDistract(m,it,'g')));
    body=`<div class="prompt"><div class="label">Listen, then choose what you heard</div>
      <div style="margin:10px 0"><button class="speak" onclick="speak('${say}')" style="font-size:16px;padding:12px 22px">&#128266; Play</button></div></div>
      <div class="opts">${opts.map(o=>`<button class="opt" style="font-family:var(--guj);font-size:20px" data-ok="${o===it.g?1:0}" onclick="exPick(this)">${o}</button>`).join('')}</div>`;
  }else if(EX.kind==='g2x'){
    const opts=shuffle([it[xf]].concat(exDistract(m,it,xf)));
    body=`<div class="prompt"><div class="label">${m.type==='numbers'?'Which number is this?':'What does this mean / sound like?'}</div>
      <div class="bigq${it.g.length>4?' small':''}">${it.g}</div></div>
      <div class="opts">${opts.map(o=>`<button class="opt" data-ok="${o===it[xf]?1:0}" onclick="exPick(this)">${o}</button>`).join('')}</div>`;
  }else{
    const opts=shuffle([it.g].concat(exDistract(m,it,'g')));
    body=`<div class="prompt"><div class="label">Which one is <b>${it[xf]}</b>?</div></div>
      <div class="opts">${opts.map(o=>`<button class="opt" style="font-family:var(--guj);font-size:20px" data-ok="${o===it.g?1:0}" onclick="exPick(this)">${o}</button>`).join('')}</div>`;
  }
  el.innerHTML=`<div class="quiz">${exHead()}${body}</div>`;
  if(EX.kind==='trace') requestAnimationFrame(()=>initPad(it.g,'expad'));
}
function exCredit(){
  const p=prog(); const id=currentModule.id;
  if(!p[id]) p[id]={seen:{}};
  p[id].ex=(p[id].ex||0)+1;
  awardPts(1,'ex');
  if(p[id].ex===30){ p[id].done=true; toast('💯 30 exercises — lesson mastered!'); openChest('lesson'); }
  saveDB();
}
let exLock=false;
function exPick(btn){
  if(exLock) return;
  const ok=btn.dataset.ok==='1';
  btn.classList.add(ok?'right':'wrong');
  if(ok){ exLock=true; exCredit(); setTimeout(function(){exLock=false; exNew();},600); }
}
let wclozeTries=0;
function wclozeCheck(){
  const inp=document.getElementById('wclozeIn'), fb=document.getElementById('wclozeFb');
  const mine=(inp.value||'').replace(/[।.!?,]/g,'').trim();
  if(!mine){ fb.innerHTML='<span class="bad">Type the missing word first. (Need the Gujarati keyboard? Gboard → Languages → ગુજરાતી)</span>'; return; }
  if(mine===EX.hideWord){
    fb.innerHTML='<span class="okw">🌟 સાચું! Correct — +2 ⭐</span>';
    awardPts(2,'wcloze'); wclozeTries=0;
    exCredit(); setTimeout(exNew,900);
  }else{
    wclozeTries++;
    if(wclozeTries>=2) fb.innerHTML='<span class="badw">Not quite.</span> The word is: <b class="wp-g">'+EX.hideWord+'</b> — type it once to learn it!';
    else fb.innerHTML='<span class="badw">Almost — check your spelling (ઇ/ઈ, ઉ/ઊ, ં) and try once more.</span>';
  }
}
function wclozeReveal(){
  document.getElementById('wclozeFb').innerHTML='The word is: <b class="wp-g">'+EX.hideWord+'</b> — now type it in the box and check!';
}
function ordPick(btn){
  if(btn.disabled) return;
  const expect=EX.sel.length;
  if(parseInt(btn.dataset.idx,10)===expect){
    EX.sel.push(btn.textContent); btn.disabled=true; btn.classList.add('right');
    document.getElementById('ordOut').textContent=EX.sel.join(' ');
    if(EX.sel.length===EX.words.length){
      toast('👍 સરસ વાક્ય! Sentence built. +1 ⭐',1600);
      exCredit(); setTimeout(exNew,800);
    }
  }else{
    btn.classList.add('wrong'); setTimeout(()=>btn.classList.remove('wrong'),500);
  }
}
function exTraceDone(){
  if(!padTouched){ toast('Trace the letters first, then tap Done.'); return; }
  const r=scoreTrace();
  if(r&&r.score<40){ toast('✏️ '+r.score+'/100 — almost! Cover more of the grey letters, then tap Done.',3600); return; }
  if(r) toast((r.score>=80?'🌟 શાબાશ! ':'👍 ')+r.score+'/100',2200);
  if(r&&r.score>=80) awardPts(1,'trace');
  exCredit(); exNew();
}

/* =========================================================
   9) PRINT WORKSHEET
   ========================================================= */
function printSheet(){
  const m=currentModule; let items=[];
  if(m.type==='letters'||m.type==='vocab') items=moduleData(m).map(x=>x.g);
  else if(m.type==='barakhadi') items=baraRow(baraSel).map(x=>x.g);
  else if(m.type==='numbers'){ for(let n=numLo;n<=Math.min(numHi,numLo+19);n++) items.push(gujNum(n)); }
  const ws=document.getElementById('worksheet');
  ws.innerHTML=`<div class="ws-head">Sheekho Gujarati — ${m.title}</div>
    <div class="ws-sub">Trace each faint letter, then copy it in the space. Name: ______________</div>`+
    items.slice(0,14).map(g=>`<div class="ws-row"><span class="wg">${g}</span><span class="wt">${g} ${g}</span></div>`).join('');
  window.print();
}

/* =========================================================
   10) SPEECH
   ========================================================= */
let VOICE=null, voiceHintShown=false, toastTimer=null;
function toast(msg,ms){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'), ms||3800);
}
function loadVoices(){
  try{
    const vs=speechSynthesis.getVoices();
    VOICE=vs.find(v=>v.lang&&v.lang.toLowerCase().indexOf('gu')===0)
        ||vs.find(v=>v.name&&/gujarati/i.test(v.name))
        ||vs.find(v=>v.lang&&v.lang.toLowerCase().indexOf('hi')===0)
        ||null;
  }catch(e){}
}
if('speechSynthesis' in window){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }
function speak(t){
  if(!('speechSynthesis' in window)){ toast('This browser cannot speak — try Chrome.'); return; }
  try{
    loadVoices();
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(t);
    u.lang='gu-IN'; if(VOICE) u.voice=VOICE;
    u.rate=.8; u.pitch=1; u.volume=1;
    /* Android Chrome quirks: brief delay after cancel(), and resume() in case the engine is paused */
    setTimeout(function(){ try{ speechSynthesis.resume(); speechSynthesis.speak(u); }catch(e){} }, 90);
    if(!VOICE && !voiceHintShown){
      voiceHintShown=true;
      toast('If you hear nothing: install "Google Text-to-Speech" and add the Gujarati voice in tablet Settings → Text-to-speech.', 6500);
    }
  }catch(e){}
}


/* =========================================================
   11a) GAME — points, levels, avatar treasure
   ========================================================= */
const AVATARS=['🦁','🐯','🐼','🦊','🐸','🐵','🦄','🐲','🦅','🦋','🐬','🐘','🦒','🐧','🐰','🐨','🦉','🦜','🐢','🐙','🤖','🦸','🧚','🧜','🧙','🥷','👑','🎩','🕶️','🚀','🛸','🏆','💎','⚡','🌈','🔥','🌟','🎸','⚽','🏏'];
function level(){ return Math.floor((DB.pts||0)/100)+1; }
function toNext(){ return 100-((DB.pts||0)%100); }
function awardPts(n,why){
  if(!CURRENT) return;
  const before=level();
  /* daily streak: first activity of the day earns +5 and grows the flame */
  const today=new Date().toISOString().slice(0,10);
  if(DB.lastDay!==today){
    const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
    DB.streak=(DB.lastDay===y)?(DB.streak||0)+1:1;
    DB.lastDay=today; n+=5;
    toast('🔥 Day '+DB.streak+' streak! +5 ⭐ daily bonus');
  }
  DB.pts=(DB.pts||0)+n;
  saveDB(); updateWho();
  if(level()>before) openChest('level');
}
function lessonChest(){ awardPts(20,'lesson'); openChest('lesson'); }
function unlockAvatar(){
  const locked=AVATARS.filter(a=>!(DB.av||[]).includes(a));
  if(!locked.length) return null;
  const a=locked[Math.floor(Math.random()*locked.length)];
  DB.av.push(a); if(!DB.avSel) DB.avSel=a; saveDB(); return a;
}
function openChest(kind){
  const box=document.getElementById('chest');
  const title=kind==='level'?('⭐ Level '+level()+' reached!'):'🎉 Lesson complete!';
  box.innerHTML=`<div class="chest-card"><div class="chest-t">${title}</div>
    <div class="chest-box" id="chestBox" onclick="popChest()">🎁</div>
    <p class="chest-hint">Tap the gift to open your treasure…</p></div>`;
  box.classList.add('show');
  confetti(26);
}
function popChest(){
  const a=unlockAvatar();
  const bonus=a?0:25; if(bonus) { DB.pts+=bonus; saveDB(); }
  const box=document.getElementById('chest');
  box.querySelector('.chest-card').innerHTML=`
    <div class="chest-t">${a?'New avatar unlocked!':'Bonus points!'}</div>
    <div class="chest-prize">${a||('+'+bonus+' ⭐')}</div>
    <p class="chest-hint">${a?'It is now in your collection — tap your avatar up top to wear it.':'You own every avatar — champion!'}</p>
    <div style="margin-top:8px"><span class="chip">⭐ ${DB.pts} points · Level ${level()}</span></div>
    <button class="btn" style="margin-top:14px" onclick="closeChest()">Keep going ➜</button>`;
  confetti(60);
  updateWho();
}
function closeChest(){ document.getElementById('chest').classList.remove('show'); if(currentModule&&document.getElementById('lesson').classList.contains('active')) renderLearn(); else renderHome(); }
function confetti(n){
  const cols=['#F3A52E','#e2555a','#3f7d4e','#23264a','#7b6cd9','#38a3c1'];
  for(let i=0;i<n;i++){
    const d=document.createElement('div'); d.className='cf';
    d.style.left=(Math.random()*100)+'vw';
    d.style.background=cols[i%cols.length];
    d.style.animationDelay=(Math.random()*0.6)+'s';
    d.style.transform='rotate('+(Math.random()*360)+'deg)';
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),3200);
  }
}
function openAvatars(){
  if(!CURRENT) return;
  const d=document.getElementById('detail');
  d.innerHTML=`<button class="x" onclick="closeDetail()">✕</button>
    <div class="detail-body"><h4 class="wr-h" style="margin-top:0">Your avatar collection · ⭐ ${DB.pts||0} pts · Level ${level()}</h4>
    <p style="font-size:13px;color:var(--ink-soft);margin-bottom:10px">${(DB.av||[]).length} of ${AVATARS.length} unlocked. Earn points to open more treasure chests! Next chest in ${toNext()} ⭐.</p>
    <div class="avgrid">${AVATARS.map(a=>{
      const own=(DB.av||[]).includes(a);
      return `<button class="avb ${own?'own':''} ${DB.avSel===a?'sel':''}" onclick="${own?`wearAvatar('${a}')`:''}">${own?a:'❓'}</button>`;
    }).join('')}</div></div>`;
  document.getElementById('scrim').classList.add('show');
}
function wearAvatar(a){ DB.avSel=a; saveDB(); updateWho(); openAvatars(); }
/* =========================================================
   11) LOGIN
   ========================================================= */
let pendingAcct=null;
function showLogin(){
  const ls=document.getElementById('loginScreen');
  ls.classList.add('show');
  document.getElementById('loginCards').innerHTML=ACCOUNTS.map(a=>
    `<button class="login-card${pendingAcct&&pendingAcct.user===a.user?' sel':''}" onclick="selectAccount('${a.user}')">
      <span class="lc-av">${a.name.charAt(0)}</span><span class="lc-name">${a.name}</span></button>`).join('');
  document.getElementById('pinRow').style.display=pendingAcct?'flex':'none';
  document.getElementById('loginError').textContent='';
}
function selectAccount(user){
  pendingAcct=ACCOUNTS.find(a=>a.user===user);
  showLogin();
  const inp=document.getElementById('pinInput'); inp.value=''; inp.focus();
}
async function tryLogin(){
  if(!pendingAcct) return;
  const pin=document.getElementById('pinInput').value.trim();
  if(pin!==pendingAcct.pin){ document.getElementById('loginError').textContent='PIN ખોટો છે — wrong PIN, try again.'; return; }
  CURRENT={...pendingAcct}; pendingAcct=null;
  loadDB();
  if(CURRENT.role==='learner'&&CLOUD_ON){
    const cloud=await cloudLoad(CURRENT.user);
    if(cloud&&cloud.prog){
      const localN=Object.keys(DB.prog).length, cloudN=Object.keys(cloud.prog).length;
      if(cloudN>=localN) DB.prog=cloud.prog;
      if((cloud.pts||0)>(DB.pts||0)) DB.pts=cloud.pts;
      if(cloud.av&&cloud.av.length>(DB.av||[]).length) DB.av=cloud.av;
      if(cloud.avSel&&!DB.avSel) DB.avSel=cloud.avSel;
      saveDB();
    }
  }
  document.getElementById('loginScreen').classList.remove('show');
  updateWho(); goHome();
}
function logout(){
  if(!CURRENT){ showLogin(); return; }
  CURRENT=null; pendingAcct=null; updateWho();
  document.getElementById('lesson').classList.remove('active');
  document.getElementById('parentDash').style.display='none';
  document.getElementById('home').style.display='block';
  renderHome(); showLogin();
}
function updateWho(){
  const av=document.getElementById('whoAvatar');
  av.textContent=CURRENT?(DB.avSel||CURRENT.name.charAt(0)):'?';
  av.onclick=CURRENT?openAvatars:null;
  document.getElementById('whoName').textContent=CURRENT?CURRENT.name+' · ⭐'+(DB.pts||0):'Log in';
}

/* =========================================================
   12) PARENT DASHBOARD
   ========================================================= */
function summarize(progObj){
  let done=0, pct=0;
  MODULES.forEach(m=>{
    const p=(progObj||{})[m.id]||{};
    const total=moduleItemCount(m);
    let mp=0;
    if(m.type==='concept'||m.type==='grammar') mp=p.done?100:0;
    else{ const seen=p.seen?Object.keys(p.seen).length:0; mp=Math.round(100*Math.min(seen,total)/total); if(p.done) mp=100; }
    if(mp===100) done++;
    pct+=mp;
  });
  return {done, total:MODULES.length, pct:Math.round(pct/MODULES.length)};
}
function ago(ts){
  if(!ts) return 'never';
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+' min ago';
  if(s<86400) return Math.floor(s/3600)+' hr ago';
  return Math.floor(s/86400)+' day(s) ago';
}
function buildKidCard(acct,data){
  const progObj=data&&data.prog?data.prog:null;
  const sum=summarize(progObj);
  let mods=MODULES.map(m=>{
    const p=(progObj||{})[m.id]||{};
    const total=moduleItemCount(m);
    let mp; if(m.type==='concept'||m.type==='grammar') mp=p.done?100:0;
    else{ const seen=p.seen?Object.keys(p.seen).length:0; mp=Math.round(100*Math.min(seen,total)/total); if(p.done) mp=100; }
    const d=mp===100;
    return `<div class="km${d?' kdone':''}"><span class="km-ic">${d?'✓':'·'}</span>
      <span class="km-name">${m.sub.replace('ધોરણ','ધો.')} · ${m.title}</span>
      <span class="km-detail">${d?'done':(mp+'%')}${p.quiz?` · quiz ${p.quiz}%`:''}${p.ex?` · ${Math.min(p.ex,30)}/30 ex`:''}</span></div>`;
  }).join('');
  return `<div class="kid-card"><div class="kid-top">
      <span class="kid-av">${acct.name.charAt(0)}</span>
      <div class="kid-id"><h3>${acct.name}</h3>
        <div class="kid-meta">${data?('Last activity: '+ago(data.updated)):'No activity yet'}</div></div>
      <span class="kid-pct">${sum.pct}%</span></div>
    <div class="kid-bar"><i style="width:${sum.pct}%"></i></div>
    <div class="kid-meta" style="margin-bottom:10px"><b>${sum.done}</b> of ${sum.total} lessons complete</div>
    <div class="kid-mods">${mods}</div></div>`;
}
async function renderParentDashboard(){
  const el=document.getElementById('parentDash');
  el.innerHTML=`<div class="dash-head"><h2>Parent dashboard</h2></div><p class="dash-loading">Loading progress…</p>`;
  if(!CLOUD_ON){
    el.innerHTML=`<div class="dash-head"><h2>Parent dashboard</h2></div>
      <div class="dash-setup"><h2>Cloud sync is off</h2>
      <p>The dashboard reads each child's progress from the online database. It works once the app is hosted online (so all devices share the same link) — progress then updates automatically every time they practise.</p></div>`;
    return;
  }
  const kids=ACCOUNTS.filter(a=>a.role==='learner'&&!a.test);
  let h=`<div class="dash-head"><h2>Parent dashboard</h2>
    <button class="btn" onclick="parentTryCourse()" style="margin-top:8px">📚 Try the course yourself</button>
    <p style="font-size:12.5px;color:var(--ink-soft);margin-top:6px">Your own progress saves separately on this device and never mixes with the girls scores.</p></div>`;
  for(const k of kids){
    const data=await cloudLoad(k.user);
    h+=buildKidCard(k,data);
  }
  el.innerHTML=h;
}

   13) BOOT
   ========================================================= */
(function boot(){
  firebaseInit();
  renderHome();
  updateWho();
  showLogin();
})();
</script>
