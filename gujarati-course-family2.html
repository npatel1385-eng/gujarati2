<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sheekho Gujarati — Std 1 to 10 Course</title>
<meta name="theme-color" content="#23264a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Gujarati">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2323264a'/%3E%3Ctext x='50' y='72' font-size='62' text-anchor='middle' fill='%23F3A52E' font-family='sans-serif' font-weight='bold'%3E%E0%AA%97%E0%AB%81%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2323264a'/%3E%3Ctext x='50' y='72' font-size='62' text-anchor='middle' fill='%23F3A52E' font-family='sans-serif' font-weight='bold'%3E%E0%AA%97%E0%AB%81%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600&family=Noto+Sans+Gujarati:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF6EC; --paper-2:#F3EAD6; --card:#FFFDF7;
    --ink:#21243D; --ink-soft:#5b5f7d; --ink-faint:#9a9bb0;
    --marigold:#F3A52E; --marigold-deep:#DE7C1B;
    --leaf:#2F7D5B; --leaf-soft:#e4f0e8;
    --rose:#C8476A;
    --line:#E6DBC0; --line-soft:#efe7d2;
    --indigo:#23264a;
    --shadow:0 1px 2px rgba(33,36,61,.06), 0 8px 24px rgba(33,36,61,.07);
    --display:'Bricolage Grotesque',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
    --guj:'Noto Sans Gujarati','Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--body);background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  .guj{font-family:var(--guj)}
  header.bar{position:sticky;top:0;z-index:50;background:var(--indigo);color:#fff;
    display:flex;align-items:center;gap:16px;padding:12px 20px;border-bottom:3px solid var(--marigold)}
  .brand{display:flex;align-items:baseline;gap:10px;cursor:pointer}
  .brand .mark{font-family:var(--guj);font-weight:700;font-size:26px;color:var(--marigold);line-height:1}
  .brand .name{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:-.01em}
  .brand .name small{display:block;font-size:11px;font-weight:500;color:#b9bbd6}
  .bar-spacer{flex:1}
  .who{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
    border-radius:999px;padding:5px 6px 5px 14px;cursor:pointer;font-size:13px;font-weight:600}
  .who .avatar{width:26px;height:26px;border-radius:50%;background:var(--marigold);color:var(--indigo);
    display:grid;place-items:center;font-weight:800;font-size:13px}
  .who:hover{background:rgba(255,255,255,.14)}
  main{max-width:1040px;margin:0 auto;padding:24px 20px 80px}
  .hero{background:var(--indigo);color:#fff;border-radius:22px;padding:34px 32px;position:relative;overflow:hidden;margin-bottom:14px}
  .hero .big{font-family:var(--guj);position:absolute;right:-6px;top:-30px;font-size:210px;line-height:1;
    color:rgba(243,165,46,.16);font-weight:700;pointer-events:none;user-select:none}
  .hero h1{font-family:var(--display);font-size:clamp(26px,5vw,40px);font-weight:800;letter-spacing:-.02em;max-width:20ch;position:relative}
  .hero h1 em{font-style:normal;color:var(--marigold)}
  .hero p{margin-top:12px;max-width:52ch;color:#c9cbe4;font-size:15px;position:relative}
  .hero .meta{margin-top:20px;display:flex;flex-wrap:wrap;gap:10px;position:relative}
  .chip{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:999px;
    padding:7px 14px;font-size:13px;font-weight:600;color:#e9eaf6}
  .chip b{color:var(--marigold)}
  .std-block{margin-top:26px}
  .std-head{display:flex;align-items:baseline;gap:12px;margin:0 2px 14px}
  .std-head .n{font-family:var(--display);font-size:13px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
    color:var(--marigold-deep);background:#fbeccf;border-radius:8px;padding:4px 10px;white-space:nowrap}
  .std-head h2{font-family:var(--display);font-size:19px;font-weight:700;letter-spacing:-.01em}
  .std-head .rule{flex:1;height:2px;background:var(--line)}
  .modules{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px}
  .mod{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:18px;cursor:pointer;
    transition:transform .15s,box-shadow .15s,border-color .15s;position:relative;text-align:left}
  .mod:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--marigold)}
  .mod .tag{font-family:var(--display);font-size:11px;font-weight:700;color:var(--ink-faint);letter-spacing:.05em;text-transform:uppercase}
  .mod .glyphset{font-family:var(--guj);font-size:26px;color:var(--ink);margin:8px 0 6px;font-weight:600;letter-spacing:2px}
  .mod h3{font-family:var(--display);font-size:16px;font-weight:700;letter-spacing:-.01em}
  .mod p{font-size:12.5px;color:var(--ink-soft);margin-top:4px}
  .mod .foot{margin-top:12px;display:flex;align-items:center;gap:8px}
  .pbar{flex:1;height:7px;background:var(--paper-2);border-radius:999px;overflow:hidden}
  .pbar i{display:block;height:100%;background:var(--leaf);border-radius:999px;width:0;transition:width .4s}
  .mod .pct{font-size:12px;font-weight:700;color:var(--ink-soft);min-width:34px;text-align:right}
  .done-badge{position:absolute;top:12px;right:12px;width:24px;height:24px;border-radius:50%;background:var(--leaf);
    color:#fff;display:none;place-items:center;font-size:13px;font-weight:800}
  .mod.complete .done-badge{display:grid}
  .mod.complete{border-color:var(--leaf)}
  .lesson{display:none}
  .lesson.active{display:block;animation:fade .25s}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .crumbs{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .back{background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:8px 14px;
    font-weight:600;font-size:13px;cursor:pointer;color:var(--ink)}
  .back:hover{border-color:var(--marigold)}
  .lesson-head h2{font-family:var(--display);font-size:25px;font-weight:800;letter-spacing:-.02em}
  .lesson-head .sub{color:var(--marigold-deep);font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
  .lesson-head p{color:var(--ink-soft);margin-top:8px;max-width:64ch;font-size:15px}
  .lesson-head .note{margin-top:14px;background:var(--leaf-soft);border:1px solid #cfe6d8;border-left:4px solid var(--leaf);
    border-radius:10px;padding:12px 16px;font-size:14px;color:#1f5a40}
  .lesson-head .note b{color:#16432f}
  .tabs{display:flex;gap:8px;margin:20px 0 18px;flex-wrap:wrap}
  .tab{background:var(--card);border:1.5px solid var(--line);border-radius:999px;padding:9px 18px;font-weight:600;
    font-size:14px;cursor:pointer;color:var(--ink-soft)}
  .tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .tab:not(.on):hover{border-color:var(--marigold);color:var(--ink)}
  .pane{display:none}.pane.on{display:block}
  .lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(136px,1fr));gap:12px}
  .lcard{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:14px 10px;text-align:center;
    cursor:pointer;transition:transform .14s,border-color .14s,box-shadow .14s;position:relative}
  .lcard:hover{transform:translateY(-3px);border-color:var(--marigold);box-shadow:var(--shadow)}
  .lcard .g{font-family:var(--guj);font-size:46px;line-height:1;color:var(--ink);font-weight:600}
  .lcard .rom{margin-top:6px;font-family:var(--display);font-weight:700;font-size:15px}
  .lcard .en{font-size:11.5px;color:var(--ink-soft);margin-top:2px}
  .lcard .rare{position:absolute;top:7px;right:7px;font-size:8.5px;font-weight:700;text-transform:uppercase;
    color:var(--marigold-deep);background:#fbeccf;border-radius:6px;padding:2px 5px}
  .wordlist{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
  .word{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;cursor:pointer;transition:.14s}
  .word:hover{border-color:var(--marigold);transform:translateY(-2px);box-shadow:var(--shadow)}
  .word .ww{font-family:var(--guj);font-size:30px;font-weight:600;color:var(--ink)}
  .word .wr{font-family:var(--display);font-weight:700;font-size:14px;margin-top:3px}
  .word .wm{font-size:13px;color:var(--ink-soft)}
  .cons-picker{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
  .cbtn{font-family:var(--guj);font-size:22px;font-weight:600;width:46px;height:46px;border-radius:11px;
    border:1.5px solid var(--line);background:var(--card);cursor:pointer;color:var(--ink);transition:.12s}
  .cbtn:hover{border-color:var(--marigold)}
  .cbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .range-tabs{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
  .rtab{border:1.5px solid var(--line);background:var(--card);border-radius:999px;padding:8px 14px;font-weight:600;
    font-size:13px;cursor:pointer;color:var(--ink-soft)}
  .rtab.on{background:var(--marigold);border-color:var(--marigold);color:var(--indigo)}
  .rtab:not(.on):hover{border-color:var(--marigold)}
  .lesson-body{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:22px 24px;max-width:760px}
  .lesson-body p{color:var(--ink-soft);font-size:15px;margin-bottom:12px}
  .lesson-body h4{font-family:var(--display);font-size:16px;font-weight:700;margin:18px 0 8px}
  .lesson-body .ex{font-family:var(--guj);font-size:18px;color:var(--ink)}
  .gtable{width:100%;border-collapse:collapse;margin-top:10px;font-size:15px}
  .gtable th{text-align:left;font-family:var(--display);font-size:12px;text-transform:uppercase;letter-spacing:.05em;
    color:var(--marigold-deep);padding:8px 10px;border-bottom:2px solid var(--line)}
  .gtable td{padding:9px 10px;border-bottom:1px solid var(--line-soft);vertical-align:top}
  .gtable td.g{font-family:var(--guj);font-size:20px;font-weight:600;white-space:nowrap}
  .gtable tr:hover td{background:var(--paper)}
  .scrim{position:fixed;inset:0;background:rgba(33,36,61,.55);backdrop-filter:blur(3px);z-index:90;
    display:none;align-items:center;justify-content:center;padding:18px}
  .scrim.show{display:flex;animation:fade .2s}
  .detail{background:var(--paper);border-radius:22px;max-width:520px;width:100%;max-height:92vh;overflow:auto;
    box-shadow:0 30px 80px rgba(0,0,0,.35);position:relative}
  .detail .x{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:50%;border:none;
    background:var(--paper-2);font-size:18px;cursor:pointer;color:var(--ink);z-index:2}
  .detail .x:hover{background:var(--line)}
  .detail-top{background:var(--indigo);color:#fff;border-radius:22px 22px 0 0;padding:30px 26px 24px;text-align:center;position:relative;overflow:hidden}
  .detail-top .ghost{position:absolute;font-family:var(--guj);font-size:200px;color:rgba(255,255,255,.06);right:-10px;bottom:-60px;line-height:1}
  .detail-top .big{font-family:var(--guj);font-size:96px;line-height:1.1;color:var(--marigold);font-weight:700;position:relative}
  .detail-top .rom{font-family:var(--display);font-size:23px;font-weight:700;margin-top:6px;position:relative}
  .speak{margin-top:14px;background:var(--marigold);color:var(--indigo);border:none;border-radius:999px;
    padding:9px 20px;font-weight:700;font-size:14px;cursor:pointer;position:relative;font-family:var(--body)}
  .speak:hover{background:#ffb649}
  .detail-body{padding:22px 26px 26px}
  .kv{margin-bottom:16px}
  .kv .k{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--marigold-deep)}
  .kv .v{font-size:16px;margin-top:3px}
  .kv .v .gw{font-family:var(--guj);font-weight:600;font-size:22px;margin-right:8px}
  .kv .v .meaning{color:var(--ink-soft)}
  .tip{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-size:14px;color:var(--ink-soft)}
  .tip b{color:var(--ink)}
  .trace-wrap{margin-top:18px}
  .trace-wrap h4{font-family:var(--display);font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
  .trace-wrap h4 button{background:none;border:1.5px solid var(--line);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;color:var(--ink-soft);font-family:var(--body)}
  .trace-wrap h4 button:hover{border-color:var(--rose);color:var(--rose)}
  canvas.pad{width:100%;background:#fff;border:1.5px dashed var(--line);border-radius:14px;touch-action:none;display:block;cursor:crosshair;-webkit-user-select:none;user-select:none}
  .wr-h{font-family:var(--disp);font-weight:700;font-size:16.5px;margin:24px 0 10px}
  .wprompt{border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;margin:8px 0;background:#fff}
  .wp-q{font-weight:600;font-size:14.5px;margin-bottom:8px}
  .wp-a{margin-top:10px;border-top:1px dashed var(--line);padding-top:10px;font-size:16px;line-height:1.7}
  .wp-g{font-family:var(--guj)}
  .btn.small{padding:7px 12px;font-size:12.5px}
  .padnote{margin-top:8px;font-size:12.5px;color:var(--ink-soft)}
  .model-block{border:1.5px solid var(--line);background:#fff;border-radius:14px;padding:14px 16px;margin:10px 0}
  .mb-t{font-family:var(--disp);font-weight:700;font-size:15px;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .mb-g{font-family:var(--guj);font-size:16.5px;line-height:2}
  .chiplet{font-size:11.5px;background:var(--parch2,#f3ecdd);border:1px solid var(--line);border-radius:999px;padding:3px 10px;font-family:var(--body,Inter)}
  .mb-moral{margin-top:10px;font-family:var(--guj);font-size:15px;font-weight:600;color:var(--leaf,#3f7d4e)}
  .mb-m{font-size:13px;color:var(--ink-soft);margin-top:8px;line-height:1.6;border-top:1px dashed var(--line);padding-top:8px}
  .wemo{font-size:20px}
  .blank{color:var(--gold,#F3A52E);letter-spacing:2px}
  .ord-out{min-height:44px;border:1.5px dashed var(--line);border-radius:12px;background:#fff;padding:10px 12px;font-family:var(--guj);font-size:19px;margin-top:8px}
  .ord-opts{margin-top:10px}
  .ordw:disabled{opacity:.45}
  .wcheck{display:flex;gap:8px;margin:4px 0 8px}
  .wcheck input{flex:1;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;font-family:var(--guj);font-size:16px;background:#fff;min-width:0}
  .wfb{font-size:14px;margin-bottom:6px}
  .wfb-line{font-family:var(--guj);font-size:16.5px;line-height:1.8}
  .okw{color:#2c7a3f;font-weight:600}
  .badw{color:#c04343;text-decoration:underline dotted}
  .wfb-miss{margin-top:4px;font-size:13px;color:var(--ink-soft)}
  .wfb-verdict{margin-top:6px;font-weight:600;font-size:13.5px}
  .bad{color:#c04343;font-size:13px}
  .chest-teaser{margin-top:10px;font-size:13.5px;background:#fff7e8;border:1.5px dashed var(--gold,#F3A52E);border-radius:12px;padding:10px 14px}
  #chest{position:fixed;inset:0;background:rgba(20,22,45,.55);display:none;align-items:center;justify-content:center;z-index:250}
  #chest.show{display:flex}
  .chest-card{background:#FBF6EC;border-radius:22px;padding:28px 26px;text-align:center;max-width:340px;width:88vw;border:2px solid var(--gold,#F3A52E);box-shadow:0 20px 60px rgba(0,0,0,.35)}
  .chest-t{font-family:var(--disp);font-weight:800;font-size:20px;margin-bottom:14px}
  .chest-box{font-size:84px;cursor:pointer;animation:wob 1s ease-in-out infinite;user-select:none}
  @keyframes wob{0%,100%{transform:rotate(-6deg) scale(1)}50%{transform:rotate(6deg) scale(1.08)}}
  .chest-prize{font-size:84px;margin:8px 0;animation:pop .5s ease}
  @keyframes pop{0%{transform:scale(.2)}70%{transform:scale(1.25)}100%{transform:scale(1)}}
  .chest-hint{font-size:13.5px;color:var(--ink-soft)}
  .cf{position:fixed;top:-14px;width:10px;height:14px;z-index:260;border-radius:2px;animation:fall 2.6s linear forwards;pointer-events:none}
  @keyframes fall{to{transform:translateY(105vh) rotate(540deg)}}
  .para-w{background:#eef3fb;border-left:3px solid #38a3c1;border-radius:8px;padding:9px 12px;font-size:13px}
  .more-btn{display:inline-block;margin:4px 6px 4px 0;padding:7px 12px;border-radius:999px;border:1.5px solid var(--gold,#F3A52E);background:#fff7e8;font-size:12.5px;font-weight:600;cursor:pointer}
  .st-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px;margin-top:8px}
  .st-card{border:1.5px solid var(--line);border-radius:12px;background:#fff;padding:11px 12px;text-align:left;cursor:pointer;display:flex;flex-direction:column;gap:3px}
  .st-card:active{border-color:var(--gold,#F3A52E)}
  .st-n{font-weight:700;font-size:13.5px;line-height:1.3}
  .st-c{font-size:11.5px;color:var(--ink-soft)}
  .st-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .st-count{font-size:12.5px;color:var(--ink-soft)}
  .st-title{font-family:var(--disp);font-size:19px;margin:4px 0 6px}
  .st-rows{margin-top:6px}
  .st-row{display:flex;flex-direction:column;gap:2px;border-top:1px dashed var(--line);padding:8px 0;font-size:13.5px}
  .st-row b{font-size:12px}
  .dphoto{width:100%;max-width:250px;border-radius:14px;display:block;margin:8px auto 2px;box-shadow:0 4px 14px rgba(0,0,0,.12)}
  .wgal{display:flex;gap:10px;overflow-x:auto;padding:10px 2px;-webkit-overflow-scrolling:touch}
  .wfig{flex:0 0 200px;margin:0;background:#fff;border:1.5px solid var(--line);border-radius:14px;overflow:hidden}
  .wimg{width:200px;height:140px;object-fit:cover;display:block}
  .wimg-ph{width:200px;height:140px;display:flex;align-items:center;justify-content:center;font-size:34px;background:#f3ecdd}
  .wfig figcaption{font-size:11.5px;padding:7px 9px;color:var(--ink-soft);line-height:1.35}
  .wgal-note{font-size:11px;color:var(--ink-soft);margin:2px 0 10px}
  .cert{padding:6px}
  .cert-in{border:3px double var(--gold,#F3A52E);border-radius:16px;padding:22px 16px;text-align:center;background:#fffdf5}
  .cert-h{font-family:var(--disp);font-weight:800;font-size:19px;margin:6px 0}
  .cert-line{font-size:13.5px;color:var(--ink-soft);line-height:1.6}
  .cert-name{font-family:var(--disp);font-weight:800;font-size:28px;margin:8px 0;color:var(--ink)}
  .cert-print{display:none}
  @media print{ .cert-print{display:block;text-align:center;border:4px double #F3A52E;padding:60px 40px;margin:40px} }
  .avgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));gap:8px}
  .avb{font-size:26px;padding:8px 0;border-radius:12px;border:1.5px solid var(--line);background:#fff;cursor:pointer}
  .avb.own{border-color:var(--gold,#F3A52E)}
  .avb.sel{outline:3px solid var(--gold,#F3A52E)}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:12px 18px;border-radius:12px;font-size:13.5px;font-weight:600;z-index:300;max-width:88vw;text-align:center;
    opacity:0;pointer-events:none;transition:opacity .25s}
  #toast.show{opacity:1}

/* numbers 1-99 (Gujarati words + roman) */
const NUM=['','એક','બે','ત્રણ','ચાર','પાંચ','છ','સાત','આઠ','નવ','દસ','અગિયાર','બાર','તેર','ચૌદ','પંદર','સોળ','સત્તર','અઢાર','ઓગણીસ','વીસ','એકવીસ','બાવીસ','ત્રેવીસ','ચોવીસ','પચ્ચીસ','છવ્વીસ','સત્તાવીસ','અઠ્ઠાવીસ','ઓગણત્રીસ','ત્રીસ','એકત્રીસ','બત્રીસ','તેત્રીસ','ચોત્રીસ','પાંત્રીસ','છત્રીસ','સડત્રીસ','અડત્રીસ','ઓગણચાળીસ','ચાળીસ','એકતાળીસ','બેતાળીસ','ત્રેતાળીસ','ચુંમાળીસ','પિસ્તાળીસ','છેતાળીસ','સુડતાળીસ','અડતાળીસ','ઓગણપચાસ','પચાસ','એકાવન','બાવન','ત્રેપન','ચોપન','પંચાવન','છપ્પન','સત્તાવન','અઠ્ઠાવન','ઓગણસાઠ','સાઠ','એકસઠ','બાસઠ','ત્રેસઠ','ચોસઠ','પાંસઠ','છાસઠ','સડસઠ','અડસઠ','અગણોસિત્તેર','સિત્તેર','એકોતેર','બોતેર','તોતેર','ચુમોતેર','પંચોતેર','છોતેર','સિત્યોતેર','અઠ્યોતેર','ઓગણ્યાએંસી','એંસી','એક્યાસી','બ્યાસી','ત્યાસી','ચોર્યાસી','પંચ્યાસી','છ્યાસી','સિત્યાસી','અઠ્યાસી','નેવ્યાસી','નેવું','એકાણું','બાણું','ત્રાણું','ચોરાણું','પંચાણું','છન્નું','સત્તાણું','અઠ્ઠાણું','નવ્વાણું'];

const GDIG=['૦','૧','૨','૩','૪','૫','૬','૭','૮','૯'];
function gujNum(n){ return String(n).split('').map(d=>GDIG[+d]).join(''); }
function numWord(n){
  if(n<100) return NUM[n];
  if(n<1000){ const h=Math.floor(n/100), r=n%100;
    const base = (n===100)?'સો':HPRE[h];
    return r===0? base : base+' '+NUM[r]; }
  if(n===1000) return 'હજાર';
  return gujNum(n);
}
function numRom(n){
  if(n<100) return NUMR[n];
  if(n<1000){ const h=Math.floor(n/100), r=n%100;
    const base=(n===100)?'so':HPRER[h];
    return r===0? base : base+' '+NUMR[r]; }
  if(n===1000) return 'hajār';
  return String(n);

  pron:{title:'સર્વનામ — Pronouns',intro:'A સર્વનામ replaces a noun so you do not repeat it.',head:['ગુજરાતી','રોમન','English'],rows:[['હું','hũ','I'],['તું','tũ','you (informal)'],['તમે','tame','you (formal/plural)'],['તે / એ','te / e','he / she / it'],['આ','ā','this'],['પેલું','pelũ','that (over there)'],['અમે','ame','we'],['આપણે','āpaṇe','we (including you)'],['તેઓ','teo','they'],['મારું','mārũ','my / mine'],['તારું','tārũ','your (informal)'],['તમારું','tamārũ','your (formal)'],['તેનું','tenũ','his / her / its'],['અમારું','amārũ','our'],['તેમનું','temnũ','their'],['પોતે','pote','oneself'],['કોણ','koṇ','who?']],note:'તું is casual (friends, kids); તમે is respectful — always use તમે with elders.'},
  gender:{title:'જાતિ — Gender',intro:'Gujarati words have three genders. The ending often gives a clue: -ો masculine, -ી feminine, -ું neuter.',head:['જાતિ','Clue','Examples'],rows:[['પુલ્લિંગ (masculine)','often ends -ો','છોકરો (boy), ઘોડો (horse), રસ્તો (road), પંખો (fan), દરિયો (sea)'],['સ્ત્રીલિંગ (feminine)','often ends -ી','છોકરી (girl), ઘોડી (mare), નદી (river), બારી (window), ખુરશી (chair)'],['નપુંસકલિંગ (neuter)','often ends -ું','છોકરું (child), ફૂલ (flower), ઘર (house), પાણી (water), પુસ્તક (book)'],['Same word, three forms','—','સારો છોકરો · સારી છોકરી · સારું બાળક'],['Animals change too','—','કૂતરો (male dog) → કૂતરી (female dog), બિલાડો → બિલાડી'],['Watch out','not every word follows the clue','ભાઈ (m), બહેન (f), પાણી (n) — learn these by use']],note:'The gender changes the endings of adjectives and verbs in the sentence.'},
  number:{title:'વચન — Singular & Plural',intro:'એકવચન = one; બહુવચન = many. The most common change is adding -ઓ, but -ો words become -ા and -ું words become -ાં.',head:['એકવચન','બહુવચન','Meaning'],rows:[['છોકરો','છોકરાઓ / છોકરા','boy → boys'],['છોકરી','છોકરીઓ','girl → girls'],['પુસ્તક','પુસ્તકો','book → books'],['ઝાડ','ઝાડો','tree → trees'],['ઘર','ઘરો','house → houses'],['નદી','નદીઓ','river → rivers'],['ફૂલ','ફૂલો','flower → flowers'],['ભાઈ','ભાઈઓ','brother → brothers'],['બહેન','બહેનો','sister → sisters'],['રસ્તો','રસ્તા','road → roads (-ો → -ા)'],['ઘોડો','ઘોડા','horse → horses (-ો → -ા)'],['પાંદડું','પાંદડાં','leaf → leaves (-ું → -ાં)'],['છોકરું','છોકરાં','child → children (-ું → -ાં)'],['આંખ','આંખો','eye → eyes']],note:'Verbs change with the plural too: છોકરો રમે છે → છોકરાઓ રમે છે.'},
  adj:{title:'વિશેષણ — Adjectives',intro:'A વિશેષણ describes a noun. Adjectives ending in -ો change to match gender: -ો / -ી / -ું. (e.g. સારો છોકરો, સારી છોકરી, સારું બાળક)',head:['ગુજરાતી','રોમન','English'],rows:[['મોટો','moṭo','big'],['નાનો','nāno','small'],['સારો','sāro','good'],['ખરાબ','kharāb','bad'],['ઊંચો','ũcho','tall / high'],['નીચો','nīcho','short / low'],['લાંબો','lāmbo','long'],['ટૂંકો','ṭūṅko','short (length)'],['નવો','navo','new'],['જૂનો','jūno','old (things)'],['ગરમ','garam','hot'],['ઠંડો','ṭhaṇḍo','cold'],['મીઠો','mīṭho','sweet'],['ખાટો','khāṭo','sour'],['કડવો','kaḍvo','bitter'],['તીખો','tīkho','spicy'],['ઝડપી','jhaḍpī','fast'],['ધીમો','dhīmo','slow'],['સુંદર','sundar','beautiful'],['સ્વચ્છ','svachchh','clean'],['ગંદો','gando','dirty'],['ભારે','bhāre','heavy'],['હલકો','halko','light (weight)'],['જાડો','jāḍo','thick / fat'],['પાતળો','pātḷo','thin'],['કઠણ','kaṭhaṇ','hard'],['નરમ','naram','soft'],['હોશિયાર','hoshiyār','clever'],['આળસુ','āḷsu','lazy'],['બહાદુર','bahādur','brave'],['ધનવાન','dhanvān','rich'],['ગરીબ','garīb','poor']],note:'Try each one with a noun: મોટું ઘર, નાની બિલાડી, ઊંચો પર્વત.'},
  verb:{title:'ક્રિયાપદ — Verbs',intro:'A ક્રિયાપદ is an action word. The dictionary form ends in -વું. Drop -વું and add endings to build sentences.',head:['ગુજરાતી','રોમન','English'],rows:[['જવું','javũ','to go'],['આવવું','āvvũ','to come'],['ખાવું','khāvũ','to eat'],['પીવું','pīvũ','to drink'],['બોલવું','bolvũ','to speak'],['વાંચવું','vānchvũ','to read'],['લખવું','lakhvũ','to write'],['રમવું','ramvũ','to play'],['જોવું','jovũ','to see'],['કરવું','karvũ','to do'],['દોડવું','doḍvũ','to run'],['ચાલવું','chālvũ','to walk'],['બેસવું','besvũ','to sit'],['ઊઠવું','ūṭhvũ','to get up'],['સૂવું','sūvũ','to sleep'],['હસવું','hasvũ','to laugh'],['રડવું','raḍvũ','to cry'],['ગાવું','gāvũ','to sing'],['નાચવું','nāchvũ','to dance'],['આપવું','āpvũ','to give'],['લેવું','levũ','to take'],['ખોલવું','kholvũ','to open'],['ધોવું','dhovũ','to wash'],['રાંધવું','rāndhvũ','to cook'],['શીખવું','shīkhvũ','to learn'],['સાંભળવું','sāmbhaḷvũ','to listen'],['સમજવું','samajvũ','to understand'],['પૂછવું','pūchhvũ','to ask'],['કહેવું','kahevũ','to say / tell'],['મળવું','maḷvũ','to meet']],note:'Pattern: હું રમું છું (I play) · તું રમે છે · તે રમે છે · અમે રમીએ છીએ · તેઓ રમે છે.'},
  tense:{title:'કાળ — Tenses',intro:'Three tenses — past, present, future. Watch the same verb change:',head:['કાળ · Tense','ગુજરાતી','English'],rows:[['વર્તમાન (present)','હું ખાઉં છું','I eat / am eating'],['ભૂત (past)','મેં ખાધું','I ate'],['ભવિષ્ય (future)','હું ખાઈશ','I will eat'],['વર્તમાન','તે રમે છે','he/she plays'],['ભૂત','તે રમ્યો','he played'],['ભવિષ્ય','તે રમશે','he/she will play'],['વર્તમાન','અમે જઈએ છીએ','we go'],['ભૂત','અમે ગયા','we went'],['ભવિષ્ય','અમે જઈશું','we will go'],['વર્તમાન','તું વાંચે છે','you read'],['ભૂત','તેં વાંચ્યું','you read (past)'],['ભવિષ્ય','તું વાંચીશ','you will read'],['ભૂત + object gender!','મેં પાઠ વાંચ્યો','I read the lesson (પાઠ is masculine → વાંચ્યો)'],['ભૂત + object gender!','મેં વાત કરી','I talked (વાત is feminine → કરી)'],['ભૂત + object gender!','મેં પુસ્તક વાંચ્યું','I read the book (પુસ્તક is neuter → વાંચ્યું)']],note:'છે/છું/છીએ mark the present; -શ/-શે/-શું the future. BIG Gujarati secret: in the past tense the verb matches the GENDER OF THE OBJECT — વાંચ્યો/કરી/વાંચ્યું all change with the noun!'},
  conj:{title:'સંયોજક — Joining words',intro:'These small words join ideas into longer sentences.',head:['ગુજરાતી','રોમન','English'],rows:[['અને','ane','and'],['પણ','paṇ','but'],['કે','ke','that / or'],['અથવા','athvā','or'],['તેથી','tethī','therefore / so'],['કારણ કે','kāraṇ ke','because'],['જ્યારે … ત્યારે','jyāre … tyāre','when … then'],['જો … તો','jo … to','if … then'],['છતાં','chhatāṃ','even though'],['માટે','māṭe','for / in order to'],['પછી','pachhī','after / then'],['પહેલાં','pahelāṃ','before']],note:'Example: વરસાદ પડે છે, તેથી અમે ઘરમાં રમીએ છીએ.'},
  post:{title:'નામયોગી — Postpositions',intro:'Gujarati puts these little words AFTER the noun (English puts them before): ઘરમાં = in the house.',head:['ગુજરાતી','English','Example'],rows:[['માં','in','ઘરમાં (in the house)'],['પર / ઉપર','on','ટેબલ પર (on the table)'],['નીચે','under','ઝાડ નીચે (under the tree)'],['થી','from / by','શાળાથી (from school)'],['ને','to (person)','મા ને કહો (tell mother)'],['નું / ની / નો','of (possessive)','રમેશનું ઘર (Ramesh house)'],['માટે','for','તારા માટે (for you)'],['સાથે','with','મિત્ર સાથે (with a friend)'],['પાસે','near / with','મારી પાસે (with me / near me)'],['સુધી','until / up to','સાંજ સુધી (until evening)'],['વગર','without','પાણી વગર (without water)'],['પહેલાં','before','જમવા પહેલાં (before eating)'],['પછી','after','શાળા પછી (after school)'],['વચ્ચે','between','બે ઘર વચ્ચે (between two houses)']],note:'Say the noun first, then the postposition: બગીચામાં, રસ્તા પર, મિત્ર સાથે.'},
  samas:{title:'સમાસ — Compound words',intro:'Two words joined into one. The type depends on how the meanings combine.',head:['સમાસ','Type','Meaning'],rows:[['સુખ-દુઃખ','દ્વન્દ્વ (pair)','joy and sorrow'],['મા-બાપ','દ્વન્દ્વ','mother and father'],['રાત-દિવસ','દ્વન્દ્વ','night and day'],['રાષ્ટ્રપતિ','તત્પુરુષ','president (lord of the nation)'],['ગ્રંથાલય','તત્પુરુષ','library (house of books)'],['દેશભક્તિ','તત્પુરુષ','patriotism (devotion to country)'],['નવરાત્રિ','દ્વિગુ (number)','Navratri (nine nights)'],['ત્રિકોણ','દ્વિગુ','triangle (three angles)'],['ચોમાસું','દ્વિગુ','monsoon (four months)'],['મહાદેવ','કર્મધારય','Mahadev (great god)'],['નીલકંઠ','બહુવ્રીહિ','Neelkanth (one with a blue throat — Shiva)'],['લંબોદર','બહુવ્રીહિ','Lambodar (one with a big belly — Ganesh)']],note:'Start by spotting દ્વન્દ્વ pairs — they are everywhere: ખાવું-પીવું, નાનું-મોટું.'},
  sandhi:{title:'સંધિ — Sound joining',intro:'When two words join, the sounds at the joint can merge and change. These come from Sanskrit rules.',head:['જોડાણ','સંધિ','Meaning'],rows:[['સૂર્ય + ઉદય','સૂર્યોદય','sunrise (a+u → o)'],['સૂર્ય + અસ્ત','સૂર્યાસ્ત','sunset (a+a → ā)'],['વિદ્યા + આલય','વિદ્યાલય','school (ā+ā → ā)'],['હિમ + આલય','હિમાલય','Himalaya (a+ā → ā)'],['દેવ + ઇન્દ્ર','દેવેન્દ્ર','lord of gods (a+i → e)'],['મહા + ઈશ','મહેશ','Mahesh (ā+ī → e)'],['ગણ + ઈશ','ગણેશ','Ganesh (a+ī → e)'],['એક + એક','એકેક','one each (a+e → e)'],['મનઃ + રથ','મનોરથ','heart wish (aḥ+r → o)'],['નિઃ + ચય? જુઓ નિશ્ચય','નિશ્ચય','determination (ḥ+ch → shch)'],['સત્ + જન','સજ્જન','good person (t+j → jj)'],['જગત્ + નાથ','જગન્નાથ','lord of the world (t+n → nn)']],note:'Spot the joint: સૂર્યોદય = સૂર્ય + ઉદય. Practice splitting compounds apart.'},
  alankar:{title:'અલંકાર — Figures of speech',intro:'અલંકાર are ornaments of language. શબ્દાલંકાર play with sound; અર્થાલંકાર play with meaning. (Example lines are original.)',head:['અલંકાર','Type','Example'],rows:[['વર્ણાનુપ્રાસ (alliteration)','શબ્દાલંકાર','કાળી કોયલ કૂજે કુંજમાં — repeated ક sound'],['ઉપમા (simile)','અર્થાલંકાર','ચંદ્ર જેવું મુખ — a face like the moon (જેવું/સમાન present)'],['રૂપક (metaphor)','અર્થાલંકાર','જીવન એક સફર છે — life IS a journey (no જેવું)'],['સજીવારોપણ (personification)','અર્થાલંકાર','પવન ગીત ગાય છે — the wind sings'],['અતિશયોક્તિ (hyperbole)','અર્થાલંકાર','આંસુની નદી વહી — a river of tears flowed'],['ઉત્પ્રેક્ષા (poetic fancy)','અર્થાલંકાર','જાણે તારા ધરતી પર ઊતર્યા — as if stars came down'],['છંદ નોંધ · metre note','છંદ','Poems follow beat patterns (છંદ) like અનુષ્ટુપ — count the માત્રા (beats) in a line']],note:'Test: if the line uses જેવું / સમાન / જાણે it is ઉપમા or ઉત્પ્રેક્ષા; if it says A IS B, it is રૂપક.'},
  prayog:{title:'પ્રયોગ — Active & passive voice',intro:'The same idea can be said three ways. Watch who leads the sentence.',head:['પ્રયોગ','ગુજરાતી','English'],rows:[['કર્તરી (active)','રમેશ પત્ર લખે છે.','Ramesh writes a letter.'],['કર્મણી (passive)','રમેશથી પત્ર લખાય છે.','A letter is written by Ramesh.'],['કર્તરી','સીતા ગીત ગાય છે.','Sita sings a song.'],['કર્મણી','સીતાથી ગીત ગવાય છે.','A song is sung by Sita.'],['કર્તરી','હું પુસ્તક વાંચું છું.','I read a book.'],['કર્મણી','મારાથી પુસ્તક વંચાય છે.','A book is read by me.'],['ભાવે (impersonal)','મારાથી ચલાતું નથી.','I cannot walk (lit. walking does not happen by me).'],['ભાવે','તેનાથી બેસાતું નથી.','He cannot sit.']],note:'Passive uses -થી on the doer and the verb shifts: લખે → લખાય, ગાય → ગવાય, વાંચે → વંચાય.'},

  gujfest:{title:'ગુજરાતના તહેવારો — Festivals of Gujarat',imgs:'Garba_(dance)~Navratri garba|Rann_of_Kutch~Rann Utsav|Ratha_Yatra_(Ahmedabad)~Rath Yatra, Ahmedabad|Diwali~Diwali lamps',intro:'A Gujarati year is a chain of festivals — here is the full calendar.',head:['તહેવાર · Festival','ક્યારે · When','શું થાય · What happens'],rows:[['ઉત્તરાયણ (મકરસંક્રાંતિ)','૧૪ જાન્યુઆરી','kites fill the sky — કાપ્યો છે! · undhiyu & chikki'],['મહાશિવરાત્રિ','ફેબ્રુ-માર્ચ','Shiva worship; huge Bhavnath fair at Junagadh'],['હોળી-ધુળેટી','માર્ચ','bonfire night, then colours!'],['રામનવમી','ચૈત્ર','birth of Shri Ram'],['રથયાત્રા','અષાઢ (જૂન-જુલાઈ)','Lord Jagannath chariot rolls through Ahmedabad'],['જન્માષ્ટમી','શ્રાવણ (ઑગસ્ટ)','Krishna birthday — biggest in Dwarka; matki phod'],['રક્ષાબંધન','શ્રાવણ','sisters tie rakhi to brothers'],['ગણેશ ચતુર્થી','ભાદરવો','Ganpati bappa comes home for 10 days'],['નવરાત્રિ','આસો (સપ્ટે-ઑક્ટો)','NINE NIGHTS of garba-dandiya — the world longest dance festival'],['દશેરા (વિજયાદશમી)','આસો','victory of good; fafda-jalebi day!'],['શરદ પૂર્ણિમા','આસો','moonlight garba & doodh-pauva'],['દિવાળી','આસો અમાસ','lamps, rangoli, fireworks, Lakshmi puja'],['બેસતું વર્ષ','દિવાળી પછી','Gujarati NEW YEAR — સાલ મુબારક! nutan varsh'],['ભાઈબીજ','નૂતન વર્ષ પછી','sisters host brothers'],['તરણેતરનો મેળો','ભાદરવો','famous folk fair — embroidered umbrellas'],['રણ ઉત્સવ','નવે-ફેબ્રુ','white desert festival in Kutch under the full moon']],note:'Ask Dadi which one was her favourite as a girl — every family has festival stories.'},

  prov:{title:'કહેવત — Proverbs',intro:'Common Gujarati sayings and what they mean.',head:['કહેવત','Meaning'],rows:[['બોલે તેના બોર વેચાય','Speak up — those who ask, get.'],['અધૂરો ઘડો છલકાય ઘણો','A half-full pot spills most — the less you know, the more you boast.'],['જ્યાં સુધી શ્વાસ ત્યાં સુધી આશ','While there is breath, there is hope.'],['વાવો તેવું લણો','You reap what you sow.'],['ટીપે ટીપે સરોવર ભરાય','Drop by drop the lake fills — small efforts add up.'],['ઝાઝા હાથ રળિયામણા','Many hands make work light.'],['મન હોય તો માળવે જવાય','Where there is a will, there is a way.'],['નાચ ન જાણે આંગણું વાંકું','A bad workman blames his tools.'],['દૂધનો દાઝ્યો છાશ ફૂંકીને પીવે','Once bitten, twice shy.'],['ઉતાવળે આંબા ન પાકે','Mangoes do not ripen in a hurry — patience.'],['પહેલું સુખ તે જાતે નર્યા','Health is the first happiness.'],['જેવો દેશ તેવો વેશ','When in Rome, do as the Romans do.'],['એક હાથે તાળી ન પડે','One hand cannot clap — it takes two.'],['લોભે લક્ષણ જાય','Greed destroys good qualities.']],note:'Use one proverb in a sentence this week — that is how they stick.'},

const CONCEPT={
  intro:{title:'How Gujarati works',html:'<h4>1 · It sounds out</h4><p>Unlike English, Gujarati letters almost always make the same sound. Learn a letter once and you can read it anywhere. You read left to right.</p><h4>2 · Every consonant hides an "a"</h4><p>The letter <span class="ex">ક</span> is not just "k" — it is <b>"ka"</b>. That built-in "a" is there unless a vowel sign changes it.</p><h4>3 · No top line, no capitals</h4><p>Gujarati has no line across the top (Hindi does), and no capital vs small letters. One shape per sound.</p>'},
  spelling:{title:'જોડણી અને વાક્યો — Spelling & sentences',html:'<h4>Word order — verb goes last</h4><p>Gujarati: <span class="ex">હું પાણી પીઉં છું</span> = "I water drink". Subject + object + verb, always.</p><h4>Two i, two u — length changes meaning</h4><p>ઇ (short) vs ઈ (long): <span class="ex">મિત્ર</span> (friend) vs <span class="ex">મીઠું</span> (salt/sweet). ઉ vs ઊ: <span class="ex">સુખ</span> (happiness) vs <span class="ex">ફૂલ</span> (flower). Read slowly and stretch the long ones.</p><h4>The dot — અનુસ્વાર (ં)</h4><p>Adds a nasal sound: <span class="ex">રંગ</span> (colour), <span class="ex">અંદર</span> (inside), <span class="ex">બંને</span> (both). Missing the dot changes the word!</p><h4>વિસર્ગ (ઃ)</h4><p>A soft breath at the end: <span class="ex">દુઃખ</span> (sorrow), <span class="ex">નમઃ</span> (in prayers).</p><h4>The three "sh/s" letters</h4><p><span class="ex">સ</span> (સાપ - snake), <span class="ex">શ</span> (શાળા - school), <span class="ex">ષ</span> (ભાષા - language). સ is plain s; શ and ષ are "sh".</p><h4>Punctuation — વિરામચિહ્નો</h4><p>પૂર્ણવિરામ <b>.</b> ends a statement · અલ્પવિરામ <b>,</b> is a pause · પ્રશ્નચિહ્ન <b>?</b> asks · ઉદ્ગારચિહ્ન <b>!</b> exclaims.</p><h4>Four types of sentences</h4><p>વિધાનવાક્ય (statement): <span class="ex">હું જમું છું.</span> · પ્રશ્નવાક્ય (question): <span class="ex">તું ક્યાં જાય છે?</span> · આજ્ઞાવાક્ય (command/request): <span class="ex">બારણું બંધ કરો.</span> · ઉદ્ગારવાક્ય (exclamation): <span class="ex">વાહ! કેવું સરસ ફૂલ!</span></p>'},
  gujarat:{title:'આપણું ગુજરાત — Our Gujarat',html:'<div class="wgal" data-imgs="Asiatic_lion~Gir — Asiatic lion|Rann_of_Kutch~White Rann of Kutch|Statue_of_Unity~Statue of Unity|Garba_(dance)~Navratri garba|Dwarkadhish_Temple~Dwarka|Amul~Amul, Anand"></div><h4>The basics</h4><p>ગુજરાત state was formed on <b>1 May 1960</b> (ગુજરાત દિવસ). Capital: <b>ગાંધીનગર</b>. Largest city: <b>અમદાવાદ</b> — a UNESCO World Heritage City. Language: ગુજરાતી. Gujarat has the <b>longest coastline in India</b> (about 1,600 km).</p><h4>Famous for</h4><p>🦁 <b>ગીરના સિંહ</b> — the only wild Asiatic lions on Earth. 🏜️ <b>કચ્છનું સફેદ રણ</b> — the white salt desert and its Rann Utsav festival. 🗽 <b>સ્ટેચ્યુ ઓફ યુનિટી</b> — the tallest statue in the world (182 m), honouring Sardar Patel. 🥛 <b>આણંદ</b> — the milk capital of India (Amul), right next to Karamsad!</p><h4>Festivals & fun</h4><p>💃 <b>નવરાત્રિ</b> — nine nights of ગરબા and દાંડિયા, the longest dance festival in the world. 🪁 <b>ઉત્તરાયણ</b> (14 Jan) — the sky fills with kites; everyone shouts "કાપ્યો છે!". 🪔 દિવાળી and the Gujarati new year — બેસતું વર્ષ.</p><h4>Food</h4><p>ઢોકળાં, થેપલાં, ખાખરા, ફાફડા-જલેબી, ઊંધિયું in winter, and છાશ with every lunch. Gujaratis love જમાડવું — feeding guests!</p>'},
  karamsad:{title:'કરમસદ અને સરદાર પટેલ — Karamsad & Sardar Patel',html:'<div class="wgal" data-imgs="Vallabhbhai_Patel~Sardar Vallabhbhai Patel|Karamsad~Karamsad|Amul~Amul dairy, Anand|Statue_of_Unity~Statue of Unity, Kevadia|Sardar_Vallabhbhai_Patel_National_Memorial~Sardar Patel Memorial"></div><h4>Your town — કરમસદ</h4><p>Karamsad is a town in <b>આણંદ જિલ્લો</b> (Anand district), in the fertile <b>ચરોતર</b> region of central Gujarat. It sits next to Vallabh Vidyanagar (a university town) and Anand — the Amul milk capital. And it is famous across India for one reason: it is the hometown of <b>સરદાર વલ્લભભાઈ પટેલ</b>. His family home is preserved here, and the Sardar Patel Memorial in Karamsad honours him. When you say you are from Karamsad, you are naming one of the proudest addresses in India.</p><h4>Sardar Vallabhbhai Patel — લોખંડી પુરુષ</h4><p>Born <b>31 October 1875</b> in Nadiad, raised in Karamsad. He walked to school, studied by lamp, and became a top lawyer — then gave it all up to join Gandhi in the freedom movement.</p><p>⚖️ Led the <b>ખેડા સત્યાગ્રહ (1918)</b> and the <b>બારડોલી સત્યાગ્રહ (1928)</b> — the farmers of Bardoli gave him the title <b>"સરદાર"</b> (leader). 🇮🇳 After independence in 1947, as India first Deputy Prime Minister and Home Minister, he peacefully united <b>562 princely states</b> into one India — that is why he is called the <b>Iron Man of India (લોખંડી પુરુષ)</b> and the architect of united India. 🛕 He also began the rebuilding of the Somnath temple. He passed away on 15 December 1950.</p><h4>His memory today</h4><p>🗽 The <b>Statue of Unity</b> (2018) on the Narmada river at Kevadia is the tallest statue in the world — 182 metres — built in his honour. 📅 His birthday, 31 October, is celebrated as <b>રાષ્ટ્રીય એકતા દિવસ</b> — National Unity Day. Remember: સરદારનું ગામ, આપણું ગામ!</p>'},
  figures:{title:'મહાન વ્યક્તિઓ — Great people of Gujarat & India',html:'<div class="wgal" data-imgs="Mahatma_Gandhi~Mahatma Gandhi|Vallabhbhai_Patel~Sardar Patel|Rabindranath_Tagore~Tagore|B._R._Ambedkar~Dr. Ambedkar|A._P._J._Abdul_Kalam~Dr. Kalam|Lata_Mangeshkar~Lata Mangeshkar|Vikram_Sarabhai~Vikram Sarabhai|Subhas_Chandra_Bose~Netaji Bose|Bhagat_Singh~Bhagat Singh|Sunita_Williams~Sunita Williams|C._V._Raman~C.V. Raman|Srinivasa_Ramanujan~Ramanujan|Dhirubhai_Ambani~Dhirubhai Ambani|Jamsetji_Tata~Jamsetji Tata"></div><h4>From Gujarat</h4><p>🕊️ <b>મહાત્મા ગાંધી</b> (Porbandar, 1869) — father of the nation; led India to freedom with truth and non-violence; his Sabarmati Ashram is in Ahmedabad. 🧲 <b>સરદાર વલ્લભભાઈ પટેલ</b> (Karamsad) — the Iron Man who united India. 🎵 <b>નરસિંહ મહેતા</b> (15th century) — the first great Gujarati poet; his ભજન "વૈષ્ણવ જન તો" was Gandhiji favourite. ✍️ <b>ઝવેરચંદ મેઘાણી</b> — called રાષ્ટ્રીય શાયર (national poet) by Gandhi, collected Saurashtra folk tales. 📚 <b>ઉમાશંકર જોશી</b> — Jnanpith-winning poet. 🚀 <b>વિક્રમ સારાભાઈ</b> (Ahmedabad) — father of the Indian space programme, founded ISRO. 🏭 <b>જમશેદજી ટાટા</b> (Navsari) — father of Indian industry. 💼 <b>ધીરુભાઈ અંબાણી</b> — from petrol-pump attendant to Reliance founder. 🎶 <b>પંડિત ઓમકારનાથ ઠાકુર</b> and <b>અવિનાશ વ્યાસ</b> — giants of Gujarati music. 🚀 <b>સુનીતા વિલિયમ્સ</b> — NASA astronaut whose father came from Jhulasan, Gujarat — a Gujarati-American like you!</p><h4>From India</h4><p>🇮🇳 <b>જવાહરલાલ નહેરુ</b> — first Prime Minister. 📜 <b>ડૉ. બાબાસાહેબ આંબેડકર</b> — architect of the Constitution. 🖋️ <b>રવીન્દ્રનાથ ટાગોર</b> — Nobel Prize poet, wrote the national anthem. 💪 <b>નેતાજી સુભાષચંદ્ર બોઝ</b> and <b>ભગતસિંહ</b> — fearless freedom fighters. ⚔️ <b>રાણી લક્ષ્મીબાઈ</b> — warrior queen of Jhansi (1857). 🚀 <b>ડૉ. એ.પી.જે. અબ્દુલ કલામ</b> — Missile Man and beloved President. 🎤 <b>લતા મંગેશકર</b> — the nightingale of India. 🎸 <b>પંડિત રવિશંકર</b> — took the sitar to the world. 🔬 <b>સી.વી. રામન</b> — Nobel Prize in physics; <b>રામાનુજન</b> — genius of mathematics. 🏑 <b>ધ્યાનચંદ</b> — hockey wizard. 🌠 <b>કલ્પના ચાવલા</b> — first Indian-origin woman in space.</p>'},
  geo:{title:'ભારતની ભૂગોળ — Geography of India',html:'<div class="wgal" data-imgs="Himalayas~The Himalaya|Ganges~The Ganga|Thar_Desert~Thar desert|Western_Ghats~Western Ghats|Sundarbans~Sundarbans|Monsoon~The monsoon"></div><h4>Where India sits</h4><p>India is the <b>7th largest country</b> in the world and the largest democracy. Its land neighbours: <b>પાકિસ્તાન</b> (west), <b>અફઘાનિસ્તાન</b> (north-west), <b>ચીન, નેપાળ, ભૂટાન</b> (north), <b>બાંગ્લાદેશ અને મ્યાનમાર</b> (east). Across the sea: <b>શ્રીલંકા</b> and <b>માલદીવ્સ</b>.</p><h4>Three waters 🌊</h4><p>West: <b>અરબી સમુદ્ર</b> (Arabian Sea — Gujarat coast!). East: <b>બંગાળનો ઉપસાગર</b> (Bay of Bengal). South: <b>હિંદ મહાસાગર</b> (Indian Ocean) — India is the only country with an ocean named after it.</p><h4>Mountains, rivers, deserts</h4><p>⛰️ The <b>હિમાલય</b> guards the north — India highest peak is Kangchenjunga (8,586 m). 🏞️ Great rivers: ગંગા, યમુના, બ્રહ્મપુત્રા in the north; <b>નર્મદા અને તાપી</b> flow through Gujarat; ગોદાવરી, કૃષ્ણા, કાવેરી in the south. 🏜️ The <b>થાર રણ</b> desert in Rajasthan; the Western and Eastern Ghats hug the coasts; the Deccan plateau fills the south.</p><h4>Climate — one country, every weather</h4><p>☔ The <b>ચોમાસું (monsoon)</b> from June to September waters the whole country — farmers wait for it like a festival. ❄️ North: cold winters (snow in Himalaya). 🔥 Rajasthan: hot desert. 🌴 Kerala & coasts: warm and humid. 🌧️ Meghalaya has the wettest place on Earth (Mawsynram). Traditionally India counts <b>six seasons</b>: વસંત, ગ્રીષ્મ, વર્ષા, શરદ, હેમંત, શિશિર.</p><h4>People & languages</h4><p>About <b>1.4 billion people</b> — every sixth person on Earth is Indian. The Constitution lists <b>22 scheduled languages</b>; ગુજરાતી is one of them. હિન્દી and English link the country together.</p>'},
  freedom:{title:'આઝાદીની લડત — India independence',html:'<div class="wgal" data-imgs="Salt_March~Dandi Salt March, 1930|Mahatma_Gandhi~Mahatma Gandhi|Vallabhbhai_Patel~Sardar Patel|Subhas_Chandra_Bose~Netaji Bose|Bhagat_Singh~Bhagat Singh|Jawaharlal_Nehru~Pt. Nehru|B._R._Ambedkar~Dr. Ambedkar"></div><h4>The long road (1857–1947)</h4><p><b>1857</b> — the First War of Independence: Mangal Pandey spark, ઝાંસીની રાણી sword. <b>1885</b> — the Indian National Congress is founded. Early giants: દાદાભાઈ નવરોજી (who proved Britain was draining India wealth), તિલક ("સ્વરાજ મારો જન્મસિદ્ધ હક છે!"), ગોખલે, લાલા લજપતરાય. <b>1905</b> — Bengal partitioned; Swadeshi movement burns foreign cloth.</p><h4>The Gandhi era</h4><p><b>1915</b> Gandhi returns from South Africa. <b>1917 ચંપારણ</b> and <b>1918 ખેડા</b> (with young Vallabhbhai Patel!) — farmers win. <b>1919</b> — the Jallianwala Bagh massacre shocks the nation. <b>1920</b> Non-cooperation: students, lawyers, titles — all walk out. <b>1928 બારડોલી</b> — Patel becomes "Sardar". <b>1930</b> — the <b>દાંડી કૂચ</b>: Gandhi walks 386 km from Sabarmati to Dandi (both in Gujarat!) and lifts a fistful of salt; the empire trembles. <b>1942</b> — "કરો યા મરો" Quit India. Women lead: સરોજિની નાયડુ, કસ્તૂરબા, અરુણા આસફઅલી.</p><h4>Every path to freedom</h4><p>🗡️ Revolutionaries: <b>ભગતસિંહ</b>, ચંદ્રશેખર આઝાદ, રાજગુરુ-સુખદેવ, ખુદીરામ બોઝ. 🪖 <b>નેતાજી સુભાષચંદ્ર બોઝ</b> and the INA fight from outside; 1946 the naval ratings mutiny — the British know the army itself is turning. 🕊️ And through it all, અહિંસા fills the jails with unafraid Indians.</p><h4>15 August 1947 · આઝાદી</h4><p>At midnight India wakes "to life and freedom" (Nehru Tryst with Destiny speech). Partition brings terrible pain — and <b>સરદાર પટેલ</b> quietly performs the miracle: 562 princely states become ONE India.</p><h4>The first government of free India</h4><p>🇮🇳 <b>PM:</b> જવાહરલાલ નહેરુ · <b>Deputy PM & Home:</b> સરદાર પટેલ · <b>Law:</b> ડૉ. આંબેડકર (drafts the Constitution) · <b>Education:</b> મૌલાના આઝાદ · <b>Food & Agriculture:</b> ડૉ. રાજેન્દ્ર પ્રસાદ (later the first President) · <b>Finance:</b> આર.કે. શણમુખમ ચેટ્ટી, પછી જોન મથાઈ · <b>Defence:</b> બલદેવસિંહ · <b>Health:</b> રાજકુમારી અમૃત કૌર (first woman cabinet minister) · <b>Industry:</b> શ્યામાપ્રસાદ મુખર્જી · <b>Labour:</b> જગજીવન રામ. A team of rivals — Gandhi insisted the cabinet include every viewpoint.</p><p>'+moreBtn('gandhi','Gandhi')+' '+moreBtn('patel','Sardar Patel')+' '+moreBtn('bose','Netaji')+' '+moreBtn('bhagat','Bhagat Singh')+' '+moreBtn('ambedkar','Dr. Ambedkar')+' '+moreBtn('nehru','Nehru')+'</p>'},
  space:{title:'ભારતનું અંતરિક્ષ સાહસ — India in space',html:'<div class="wgal" data-imgs="Chandrayaan-3~Chandrayaan-3 on the Moon|Vikram_Sarabhai~Dr. Vikram Sarabhai|A._P._J._Abdul_Kalam~Dr. APJ Abdul Kalam|Mars_Orbiter_Mission~Mangalyaan|Indian_Space_Research_Organisation~ISRO"></div><h4>A bicycle, a church, and a dream</h4><p>India space programme began in a fishing village church in Thumba (1963) — the first rocket parts were carried on a <b>bicycle</b>. The dreamer behind it: <b>ડૉ. વિક્રમ સારાભાઈ of Ahmedabad</b>, who founded <b>ISRO in 1969</b> and argued that a developing country needs space technology the MOST — for weather warnings, TV education and telephones.</p><h4>Milestones 🚀</h4><p><b>1975</b> — first satellite <b>આર્યભટ્ટ</b>. <b>1980</b> — SLV-3 rocket, project led by young <b>એ.પી.જે. અબ્દુલ કલામ</b>, makes India a space-faring nation. <b>1990s</b> — the PSLV becomes ISRO trusted workhorse (it once launched <b>104 satellites in a single flight</b> — world record). <b>2008</b> — <b>ચંદ્રયાન-1</b> discovers water on the Moon. <b>2013–14</b> — <b>મંગળયાન</b> reaches Mars orbit on the FIRST attempt — no nation had done that — costing less than a Hollywood movie. <b>23 Aug 2023</b> — <b>ચંદ્રયાન-3</b>: lander Vikram (named for Sarabhai) and rover Pragyan land near the Moon south pole — the first country ever. Now celebrated as <b>National Space Day</b>. <b>2023</b> — Aditya-L1 flies to study the Sun. <b>Next</b> — ગગનયાન: Indian astronauts (વ્યોમનૌત) in an Indian rocket.</p><h4>The scientists to know 🔬</h4><p><b>વિક્રમ સારાભાઈ</b> (father of the programme, Ahmedabad) · <b>સતીશ ધવન</b> (the launch centre bears his name) · <b>એ.પી.જે. અબ્દુલ કલામ</b> (Missile Man, People President) · <b>યુ.આર. રાવ</b> (satellites) · the women of Mangalyaan like <b>રિતુ કરીધલ</b> · and beyond space: <b>સી.વી. રામન</b> (Nobel, physics), <b>રામાનુજન</b> (mathematics genius), <b>જગદીશચંદ્ર બોઝ</b> (plants have life!), <b>હોમી ભાભા</b> (atomic energy), and astronaut <b>સુનીતા વિલિયમ્સ</b>, whose father came from Jhulasan, Gujarat.</p><p>'+moreBtn('sarabhai','Vikram Sarabhai')+' '+moreBtn('kalam','Dr. Kalam')+' '+moreBtn('chandrayaan','Chandrayaan')+'</p>'},
  history:{title:'ભારતનો ઇતિહાસ — 5,000 years, era by era',html:'<div class="wgal" data-imgs="Mohenjo-daro~Mohenjo-daro, ~2500 BCE|Sanchi~Sanchi Stupa, Ashoka era|Nalanda~Nalanda university|Brihadisvara_Temple~Chola Brihadisvara, 1010|Agra_Fort~Agra Fort, Mughal era|Salt_March~Gandhi Dandi March, 1930|Chandrayaan-3~Chandrayaan-3, 2023"></div><h4>🏺 ~3300–1300 BCE · સિંધુ ખીણ સભ્યતા (Indus Valley)</h4><p>One of the world first urban civilizations. Harappa and Mohenjo-daro had straight streets, brick houses, covered drains, public baths, standard weights and trade by sea. Gujarat was at its heart: <b>લોથલ</b> had one of the world first dockyards, and <b>ધોળાવીરા</b> in Kutch is a UNESCO site with clever water reservoirs. Their script is still undeciphered.</p><p class="para-w">🌍 Meanwhile in the world: Egypt was building the pyramids and Mesopotamia its ziggurats — the Indus cities were as advanced, and better planned.</p><p>'+moreBtn('harappa','the Indus Valley')+'</p><h4>📿 ~1500–600 BCE · વૈદિક કાળ (Vedic age)</h4><p>The four Vedas — humanity oldest continuously recited texts — were composed in Sanskrit, the grandmother of Gujarati and many Indian languages. Villages, cattle-keeping, and the great epics રામાયણ and મહાભારત took shape in this age. The Upanishads asked the deepest questions: who am I? what is truth?</p><p class="para-w">🌍 Meanwhile: Troy fell in Greece (~1180 BCE) and the first Olympics were held (776 BCE).</p><h4>☸️ ~600–322 BCE · બુદ્ધ, મહાવીર અને મહાજનપદ</h4><p>Sixteen મહાજનપદ kingdoms flourished. Two princes changed the world by walking away from their thrones: <b>ભગવાન બુદ્ધ</b> taught the middle path and compassion; <b>ભગવાન મહાવીર</b> taught અહિંસા — total non-violence. Universities like Taxila drew students from many lands.</p><p class="para-w">🌍 Meanwhile: Socrates was asking questions in Athens, Confucius teaching in China — the same century, three lands, one search for truth.</p><p>'+moreBtn('buddha','Buddha')+' '+moreBtn('mahavir','Mahavir')+'</p><h4>🦁 322–185 BCE · મૌર્ય સામ્રાજ્ય</h4><p>ચંદ્રગુપ્ત મૌર્ય, guided by ચાણક્ય (whose અર્થશાસ્ત્ર is a masterpiece of statecraft), built India first great empire — right after turning back the generals of Alexander. His grandson <b>સમ્રાટ અશોક</b>, heartbroken after the Kalinga war, chose ધમ્મ: hospitals, wells, tree-lined roads, and kindness carved on pillars from Afghanistan to Karnataka. His lions roar on every rupee; his chakra spins on our flag.</p><p class="para-w">🌍 Meanwhile: Alexander the Great had just died (323 BCE); Rome was still a small republic fighting its neighbours.</p><p>'+moreBtn('ashoka','Emperor Ashoka')+'</p><h4>✨ ~320–550 CE · ગુપ્ત સુવર્ણયુગ (Golden Age)</h4><p>Science, art and mathematics bloomed. <b>આર્યભટ્ટ</b> worked with zero and decimals, measured the year, and said the Earth spins. કાલિદાસ wrote plays the world still performs. The iron pillar of Delhi (1,600 years old) still refuses to rust. Nalanda university had 9 storeys of libraries and students from Korea to Persia.</p><p class="para-w">🌍 Meanwhile: the Roman empire was collapsing (Rome sacked 410 CE) — as Europe entered its "dark ages", India entered its brightest.</p><p>'+moreBtn('aryabhata','Aryabhata & the zero')+'</p><h4>🛕 ~850–1300 · Temple builders, south and west</h4><p>The <b>ચોળ</b> kings of the south built the towering Brihadisvara temple (1010) and sent navies and traders to Southeast Asia — Indian culture sailed to Cambodia (Angkor Wat is Vishnu temple!). In Gujarat the <b>સોલંકી</b> golden age gave us the Modhera Sun Temple (1026), the carved stepwell <b>રાણી કી વાવ</b> (~1063, on the ₹100 note) and Patan patola weaving.</p><p class="para-w">🌍 Meanwhile: Vikings were raiding Europe, and William conquered England (1066) — just three years after Rani ki Vav was being carved.</p><h4>🕌 1206–1707 · સલ્તનત અને મુઘલ યુગ</h4><p>The Delhi Sultanate rose from 1206 (Qutub Minar). In 1526 બાબર founded the Mughal empire. <b>અકબર</b> ruled with tolerance and genius; <b>શાહજહાં</b> built the Taj Mahal (1632–53) and the Red Fort. New foods, music (sitar, tabla), and Indo-Islamic architecture blended into Indian life. In the south and west, વિજયનગર (Hampi) dazzled visitors, and <b>છત્રપતિ શિવાજી</b> built the Maratha power that would humble the empire.</p><p class="para-w">🌍 Meanwhile: Europe Renaissance — Shakespeare wrote (1600s) while the Taj rose; when Akbar ruled, Elizabeth I ruled England, and India produced about a quarter of the WORLD entire wealth.</p><p>'+moreBtn('akbar','Akbar')+' '+moreBtn('shivaji','Shivaji Maharaj')+'</p><h4>⚓ 1600–1857 · Traders become rulers</h4><p>European companies came for spices and cotton. The British East India Company, after the Battle of Plassey (1757), taxed and drained Bengal, then province by province took India. Handloom weavers were ruined; famines followed. In <b>1857</b> soldiers and kings — મંગલ પાંડે, ઝાંસીની રાણી લક્ષ્મીબાઈ, તાત્યા ટોપે — rose in the First War of Independence. It was crushed, and from 1858 the British Crown ruled directly.</p><p class="para-w">🌍 Meanwhile: the American Civil War began (1861); Britain industrial revolution ran partly on Indian cotton and taxes.</p><h4>🇮🇳 1885–1947 · સ્વાતંત્ર્ય સંગ્રામ — the freedom struggle</h4><p>See the full dedicated lesson <b>"Independence · આઝાદીની લડત"</b> in ધોરણ 9 — Gandhi, Sardar, Netaji, Bhagat Singh and the march to 15 August 1947.</p><h4>🚀 1947 → આજ · Modern India</h4><p>1947: freedom (and the pain of partition). <b>સરદાર પટેલ</b> united 562 princely states. 26 Jan 1950: the Republic, with Dr. Ambedkar Constitution. 1960: Gujarat state born. The Green Revolution ended famines; the <b>White Revolution</b> — started at Amul, Anand, next to Karamsad — made India the world largest milk producer. 1969: ISRO founded by Ahmedabad own Vikram Sarabhai. 1991: the economy opened and India tech rise began. 2023: Chandrayaan-3 landed where no nation had. Today: 1.4 billion people, the largest democracy — history still being written, partly by kids like you.</p><p>'+moreBtn('chandrayaan','India on the Moon')+' '+moreBtn('sarabhai','Vikram Sarabhai')+'</p>'},

  review:{title:'Where to go next',html:'<h4>You have covered a lot</h4><p>Script, બારાખડી, numbers to a thousand, hundreds of words, core grammar, and everyday speaking. That is a real foundation.</p><h4>Keep it alive</h4><p>The fastest way to lock it in: read Gujarati signs and labels aloud, write a few words a day, and try one new spoken phrase at dinner. Small daily practice beats long rare sessions.</p><h4>Ask for more</h4><p>Tell your parent which grade you want to go deeper on — more words, more grammar, or reading practice — and it can be added.</p>'},
};

  s_thirstycrow:{title:'તરસ્યો કાગડો · The thirsty crow',len:'ટૂંકી વાર્તા · short story',
    g:['એક કાગડો હતો. તેને બહુ તરસ લાગી હતી. તે પાણી શોધવા ઊડ્યો. તેણે એક ઘડો જોયો. ઘડામાં થોડું જ પાણી હતું. કાગડાની ચાંચ પાણી સુધી પહોંચી નહીં.','કાગડાએ વિચાર કર્યો. તેણે નાના નાના કાંકરા લીધા અને ઘડામાં નાખ્યા. પાણી ઉપર આવ્યું. કાગડાએ પાણી પીધું અને ખુશ થઈને ઊડી ગયો.'],
    m:'A crow was very thirsty. He found a pot with little water and could not reach it. He thought, dropped small pebbles in, the water rose, he drank and flew away happy.',

    qs:[{q:'કાગડાને શું લાગી હતી?',o:['ભૂખ','તરસ','ઊંઘ','ઠંડી'],c:1},{q:'કાગડાએ ઘડામાં શું નાખ્યું?',o:['પાંદડાં','ફૂલ','કાંકરા','માટી'],c:2},{q:'વાર્તાનો બોધ શું છે?',o:['ઝડપ કરવી','યુક્તિથી કામ થાય','ઊંઘ સારી','પાણી ન પીવું'],c:1}]},
  s_antdove:{title:'કીડી અને કબૂતર · The ant and the dove',len:'ટૂંકી વાર્તા · short story',
    g:['એક કીડી નદીમાં પડી ગઈ. તે ડૂબવા લાગી. ઝાડ પર બેઠેલા કબૂતરે તે જોયું. કબૂતરે એક પાંદડું પાણીમાં નાખ્યું. કીડી પાંદડા પર ચડી ગઈ અને બચી ગઈ.','થોડા દિવસ પછી એક શિકારી કબૂતરને પકડવા આવ્યો. કીડીએ તે જોયું. કીડીએ શિકારીના પગે જોરથી ડંખ માર્યો. શિકારીની જાળ પડી ગઈ અને કબૂતર ઊડી ગયું.'],
    m:'An ant fell in the river; a dove dropped a leaf and saved her. Days later a hunter came for the dove; the ant bit his foot, the net fell, the dove flew free.',
    moral:'બોધ: કરેલું સારું કામ ક્યારેય નકામું જતું નથી. (A good deed is never wasted.)',
    qs:[{q:'કીડી ક્યાં પડી ગઈ?',o:['કૂવામાં','નદીમાં','તળાવમાં','દરિયામાં'],c:1},{q:'કબૂતરે કીડીને કેવી રીતે બચાવી?',o:['ચાંચથી ઉપાડી','પાંદડું નાખ્યું','બૂમ પાડી','ડાળી નમાવી'],c:1},{q:'કીડીએ કબૂતરને કેવી રીતે મદદ કરી?',o:['ગીત ગાયું','શિકારીને ડંખ માર્યો','જાળ કાપી','પથ્થર ફેંક્યો'],c:1}]},
  s_hareturtle:{title:'સસલું અને કાચબો · The hare and the tortoise',len:'મધ્યમ વાર્તા · medium story',
    g:['એક જંગલમાં સસલું અને કાચબો રહેતાં હતાં. સસલું બહુ ઝડપી હતું અને તેને પોતાની ઝડપ પર ખૂબ ગર્વ હતો. તે રોજ કાચબાની ધીમી ચાલની મજાક ઉડાવતું.','એક દિવસ કાચબાએ કહ્યું, "ચાલ, આપણે દોડ લગાવીએ." સસલું હસી પડ્યું, પણ તેણે હા પાડી. બધાં પ્રાણીઓ દોડ જોવા ભેગાં થયાં. દોડ શરૂ થઈ. સસલું પવનની જેમ દોડ્યું અને ઘણું આગળ નીકળી ગયું.','પાછળ જોઈને સસલાએ વિચાર્યું, "કાચબો તો બહુ દૂર છે. હું થોડી વાર આરામ કરી લઉં." સસલું ઝાડ નીચે સૂઈ ગયું અને તેને ઘસઘસાટ ઊંઘ આવી ગઈ.','કાચબો ધીમે ધીમે, પણ અટક્યા વગર ચાલતો રહ્યો. તે સૂતેલા સસલા પાસેથી પસાર થયો અને છેવટે લક્ષ્ય સુધી પહોંચી ગયો. જ્યારે સસલું જાગ્યું, ત્યારે બહુ મોડું થઈ ગયું હતું. કાચબો જીતી ગયો હતો.'],
    m:'A proud, fast hare mocked a slow tortoise. They raced. The hare sprinted far ahead, then napped under a tree. The tortoise walked slowly without stopping, passed the sleeping hare and won.',
    moral:'બોધ: ધીમી પણ સતત મહેનત જીતે છે. (Slow and steady wins the race.)',
    qs:[{q:'સસલાને શેનો ગર્વ હતો?',o:['પોતાના રંગનો','પોતાની ઝડપનો','પોતાના કાનનો','પોતાના ઘરનો'],c:1},{q:'સસલું દોડ વચ્ચે કેમ હાર્યું?',o:['પડી ગયું','રસ્તો ભૂલ્યું','સૂઈ ગયું','થાકી ગયું'],c:2},{q:'કાચબો કેમ જીત્યો?',o:['ઝડપથી દોડ્યો','અટક્યા વગર ચાલ્યો','ટૂંકો રસ્તો લીધો','સસલાએ મદદ કરી'],c:1},{q:'આ વાર્તાનો બોધ શું?',o:['ઝડપ જ બધું છે','આરામ જરૂરી છે','સતત મહેનત જીતે છે','દોડ ન કરવી'],c:2}]},
  s_honestwood:{title:'પ્રામાણિક કઠિયારો · The honest woodcutter',len:'મધ્યમ વાર્તા · medium story',
    g:['એક ગામમાં એક ગરીબ કઠિયારો રહેતો હતો. તે રોજ જંગલમાં જઈને લાકડાં કાપતો અને વેચીને પોતાનું ગુજરાન ચલાવતો. તે ખૂબ પ્રામાણિક હતો.','એક દિવસ નદી કિનારે ઝાડ કાપતાં તેની કુહાડી પાણીમાં પડી ગઈ. કઠિયારો રડવા લાગ્યો, કારણ કે તેની પાસે બીજી કુહાડી ખરીદવાના પૈસા નહોતા. ત્યારે નદીમાંથી જળદેવી પ્રગટ થયાં.','જળદેવીએ પહેલાં સોનાની કુહાડી બતાવી. કઠિયારાએ કહ્યું, "આ મારી નથી." પછી ચાંદીની કુહાડી બતાવી. તેણે ફરી ના પાડી. છેવટે લોખંડની જૂની કુહાડી બતાવી. કઠિયારો ખુશ થઈને બોલ્યો, "હા, આ જ મારી કુહાડી છે!"','તેની પ્રામાણિકતાથી ખુશ થઈને જળદેવીએ તેને ત્રણેય કુહાડીઓ ભેટમાં આપી દીધી. કઠિયારો આનંદથી ઘરે ગયો.'],
    m:'A poor honest woodcutter dropped his axe in the river. The river goddess offered a gold axe, then silver — he refused both, claiming only his old iron axe. Pleased with his honesty, she gifted him all three.',
    moral:'બોધ: પ્રામાણિકતાનું ફળ હંમેશાં મીઠું હોય છે. (Honesty is always rewarded.)',
    qs:[{q:'કઠિયારાની કુહાડી ક્યાં પડી?',o:['કૂવામાં','નદીમાં','ખાડામાં','દરિયામાં'],c:1},{q:'જળદેવીએ પહેલાં કઈ કુહાડી બતાવી?',o:['લોખંડની','ચાંદીની','સોનાની','તાંબાની'],c:2},{q:'કઠિયારાએ સોનાની કુહાડી કેમ ન લીધી?',o:['ભારે હતી','તેની નહોતી','જૂની હતી','નાની હતી'],c:1},{q:'અંતે કઠિયારાને શું મળ્યું?',o:['કંઈ નહીં','એક કુહાડી','ત્રણેય કુહાડી','પૈસા'],c:2}]},
  s_unity:{title:'ખેડૂત અને તેના દીકરા · The farmer and his sons',len:'લાંબી વાર્તા · long story',
    g:['એક ગામમાં એક ડાહ્યો ખેડૂત રહેતો હતો. તેને ચાર દીકરા હતા. ચારેય મહેનતુ હતા, પણ તેઓ આખો દિવસ એકબીજા સાથે ઝઘડ્યા કરતા. ખેડૂત આ જોઈને બહુ દુઃખી થતો. તેણે દીકરાઓને ઘણી વાર સમજાવ્યા, પણ કોઈ સાંભળતું નહીં.','ખેડૂત હવે ઘરડો થયો હતો. તેને ચિંતા થઈ કે મારા ગયા પછી આ દીકરાઓનું શું થશે? એક દિવસ તેને એક યુક્તિ સૂઝી. તેણે ચારેય દીકરાઓને બોલાવ્યા અને લાકડીઓનો એક ભારો મંગાવ્યો.','ખેડૂતે મોટા દીકરાને કહ્યું, "આ આખો ભારો ભાંગી નાખ." મોટા દીકરાએ પૂરી તાકાત લગાવી, પણ ભારો ભાંગ્યો નહીં. પછી બીજા, ત્રીજા અને ચોથા દીકરાએ વારાફરતી પ્રયત્ન કર્યો. કોઈથી ભારો ભાંગ્યો નહીં.','હવે ખેડૂતે ભારો છોડ્યો અને દરેક દીકરાના હાથમાં એક એક લાકડી આપી. "હવે ભાંગો," તેણે કહ્યું. દરેક દીકરાએ પોતાની લાકડી સહેલાઈથી ભાંગી નાખી.','ખેડૂતે હસીને કહ્યું, "દીકરાઓ, જોયું? જ્યાં સુધી તમે આ ભારાની જેમ સાથે રહેશો, ત્યાં સુધી તમને કોઈ હરાવી નહીં શકે. પણ જો તમે અલગ અલગ થઈ જશો, તો આ એકલી લાકડીની જેમ સહેલાઈથી ભાંગી જશો."','દીકરાઓ પિતાની વાત સમજી ગયા. તે દિવસથી તેમણે ઝઘડવાનું છોડી દીધું અને હળીમળીને રહેવા લાગ્યા. તેમનું ખેતર આખા ગામમાં સૌથી સારું બન્યું, અને ખેડૂત શાંતિથી જીવ્યો.'],
    m:'A wise old farmer had four hardworking sons who always quarrelled. He gave them a bundle of sticks — none could break it. Then single sticks — each broke easily. "Together you are unbreakable; divided you snap like a single stick." The sons understood, stopped fighting, and their farm became the best in the village.',
    moral:'બોધ: સંપ ત્યાં જંપ — એકતામાં જ બળ છે. (Unity is strength.)',
    qs:[{q:'ખેડૂતને કેટલા દીકરા હતા?',o:['બે','ત્રણ','ચાર','પાંચ'],c:2},{q:'દીકરાઓ આખો દિવસ શું કરતા?',o:['રમતા','ઝઘડતા','સૂતા','ગાતા'],c:1},{q:'આખો ભારો કોણ ભાંગી શક્યું?',o:['મોટો દીકરો','ચોથો દીકરો','ખેડૂત','કોઈ નહીં'],c:3},{q:'એક એક લાકડીનું શું થયું?',o:['ભાંગી નહીં','સહેલાઈથી ભાંગી','ખોવાઈ ગઈ','બળી ગઈ'],c:1},{q:'વાર્તાનો બોધ શું છે?',o:['મહેનત કરો','એકતામાં બળ છે','ઝડપ રાખો','લાકડાં ભેગાં કરો'],c:1}]},
};

      {t:'મારો પરિવાર · My family',g:'અમારો પરિવાર નાનો અને સુખી છે. મારા ઘરમાં મમ્મી, પપ્પા, મારી બહેન અને હું રહીએ છીએ. મારા પપ્પા કામ કરે છે અને મમ્મી અમારું ધ્યાન રાખે છે. અમે સાંજે સાથે જમીએ છીએ અને વાતો કરીએ છીએ. રવિવારે અમે બગીચામાં ફરવા જઈએ છીએ. મને મારો પરિવાર બહુ વહાલો છે.',m:'Our family is small and happy. Mummy, Pappa, my sister and I live in my house. Pappa works and Mummy takes care of us. In the evening we eat together and talk. On Sundays we go for a walk in the garden. I love my family very much.'},
      {t:'મારી શાળા · My school',g:'મારી શાળા બહુ સુંદર છે. તેમાં મોટું મેદાન અને પુસ્તકાલય છે. મારા શિક્ષકો પ્રેમથી ભણાવે છે. હું રોજ સવારે શાળાએ જાઉં છું. ત્યાં હું નવી વાતો શીખું છું અને મિત્રો સાથે રમું છું. મને મારી શાળા ખૂબ ગમે છે.',m:'My school is very beautiful. It has a big playground and a library. My teachers teach with love. I go to school every morning. There I learn new things and play with friends. I like my school a lot.'},
      {t:'મારો મિત્ર · My friend',g:'રાહુલ મારો સૌથી સારો મિત્ર છે. તે મારી સાથે ભણે છે. તે ભણવામાં હોશિયાર અને સ્વભાવે શાંત છે. અમે સાથે રમીએ છીએ અને સાથે લેસન કરીએ છીએ. મુશ્કેલીમાં તે હંમેશાં મદદ કરે છે. સાચો મિત્ર જીવનની મોટી ભેટ છે.',m:'Rahul is my best friend. He studies with me. He is clever in studies and calm by nature. We play together and do homework together. In difficulty he always helps. A true friend is a great gift of life.'}],
    prompts:[
      {q:'મારી મમ્મી (My mother) — Who is she? What does she do for you? Why do you love her?',a:'મારી મમ્મી બહુ પ્રેમાળ છે. તે રોજ અમારા માટે સરસ રસોઈ બનાવે છે. તે મને ભણવામાં મદદ કરે છે. મને મારી મમ્મી દુનિયામાં સૌથી વધુ વહાલી છે.',ar:''},
      {q:'મારું ઘર (My house) — Where is it? What is inside? How do you feel there?',a:'મારું ઘર સુંદર અને સ્વચ્છ છે. તેમાં ચાર ઓરડા અને એક રસોડું છે. ઘરની આગળ નાનો બગીચો છે. હું મારા ઘરમાં ખૂબ ખુશ છું.',ar:''},
      {q:'મારો પ્રિય તહેવાર (My favourite festival) — Which one? What do you do? Why do you like it?',a:'મારો પ્રિય તહેવાર દિવાળી છે. દિવાળીમાં અમે ઘર સજાવીએ છીએ અને દીવા પ્રગટાવીએ છીએ. અમે નવાં કપડાં પહેરીએ છીએ અને મીઠાઈ ખાઈએ છીએ. દિવાળી પ્રકાશ અને આનંદનો તહેવાર છે.',ar:''},
      {q:'વરસાદનો દિવસ (A rainy day) — What happens? What do you see? What do you enjoy?',a:'વરસાદના દિવસે આકાશમાં કાળાં વાદળ છવાય છે. ઠંડો પવન વાય છે અને ટીપાં પડવા લાગે છે. બાળકો પાણીમાં કાગળની હોડી તરાવે છે. મને વરસાદમાં ગરમ ભજિયાં ખાવાં ગમે છે.',ar:''},
      {q:'મારું પ્રિય પ્રાણી (My favourite animal) — Which animal? What does it look like? Why do you like it?',a:'મારું પ્રિય પ્રાણી હાથી છે. હાથી બહુ મોટો અને શાંત હોય છે. તેની સૂંઢ લાંબી અને કાન પંખા જેવા હોય છે. હાથી ડાહ્યું અને સમજદાર પ્રાણી છે.',ar:''}]},
  essay:{title:'Write an essay · નિબંધ',long:true,
    tips:'<h4>Essay structure</h4><p>A નિબંધ has three parts:</p><p><b>શરૂઆત</b> (opening) — 1–2 sentences introducing the topic. <b>મુદ્દા</b> (body) — 5–8 sentences of details, one idea per sentence. <b>અંત</b> (ending) — 1–2 sentences with your conclusion or feeling.</p><p>Aim for 8–12 short sentences. Read your essay aloud when done.</p>',
    models:[
      {t:'દિવાળી · Diwali',g:'દિવાળી આપણો સૌથી મોટો તહેવાર છે. તે દર વર્ષે આસો મહિનાના અંતે આવે છે. દિવાળી પ્રકાશનો તહેવાર છે. આ દિવસોમાં લોકો પોતાનાં ઘર સાફ કરીને શણગારે છે. બારણે રંગોળી બનાવે છે અને દીવા પ્રગટાવે છે. બાળકો નવાં કપડાં પહેરે છે અને ફટાકડા ફોડે છે. ઘરોમાં જાતજાતની મીઠાઈઓ બને છે. લોકો એકબીજાને સાલ મુબારક કહે છે. દિવાળી અંધારા પર પ્રકાશના વિજયનો તહેવાર છે. આ તહેવાર આપણને હળીમળીને રહેવાનું શીખવે છે.',m:'Diwali is our biggest festival. It comes every year at the end of the month of Aaso. Diwali is the festival of light. In these days people clean and decorate their homes. They make rangoli at the door and light lamps. Children wear new clothes and burst crackers. All kinds of sweets are made at home. People wish each other Saal Mubarak. Diwali is the festival of the victory of light over darkness. This festival teaches us to live together in harmony.'},
      {t:'ગાય · The cow',g:'ગાય એક પાળેલું પ્રાણી છે. ભારતમાં ગાયને ગૌમાતા કહે છે. ગાયને ચાર પગ, બે શિંગડાં અને લાંબી પૂંછડી હોય છે. ગાય ઘાસ અને ચારો ખાય છે. ગાય આપણને દૂધ આપે છે. દૂધમાંથી દહીં, ઘી અને માખણ બને છે. ગાયનું છાણ ખેતરમાં ખાતર તરીકે વપરાય છે. ગાય સ્વભાવે શાંત અને ભોળી હોય છે. ખેડૂતના જીવનમાં ગાયનું ઘણું મહત્ત્વ છે. આપણે ગાયની સંભાળ રાખવી જોઈએ.',m:'The cow is a domestic animal. In India the cow is called Gaumata. A cow has four legs, two horns and a long tail. The cow eats grass and fodder. The cow gives us milk. From milk we get yogurt, ghee and butter. Cow dung is used as fertilizer in the fields. The cow is calm and gentle by nature. The cow is very important in a farmer life. We should take care of cows.'}],
    prompts:[
      {q:'મારી શાળા (My school) — Plan: ક્યાં છે? · કેવી છે? · શિક્ષકો કેવા છે? · તમે શું શીખો છો? · કેમ ગમે છે?',a:'શરૂઆત: મારી શાળાનું નામ અને સ્થળ. મુદ્દા: મકાન અને મેદાન, શિક્ષકો, મિત્રો, પ્રિય વિષય, રમતગમત. અંત: મને મારી શાળા કેમ વહાલી છે.',ar:''},
      {q:'ઉનાળાની રજાઓ (Summer vacation) — Plan: ક્યારે પડે? · તમે શું કરો છો? · ક્યાં ફરવા જાઓ છો? · શું શીખો છો?',a:'શરૂઆત: ઉનાળાની રજા ક્યારે આવે છે. મુદ્દા: દાદા-દાદીના ઘરે જવું, રમતો, નવી વસ્તુ શીખવી, કેરી ખાવી. અંત: રજાઓ કેમ ગમે છે.',ar:''},
      {q:'ઝાડનું મહત્ત્વ (Importance of trees) — Plan: ઝાડ શું આપે છે? · ઝાડ ન હોય તો? · આપણે શું કરવું જોઈએ?',a:'શરૂઆત: ઝાડ આપણા મિત્ર છે. મુદ્દા: ઓક્સિજન, છાંયો, ફળ-ફૂલ, વરસાદ, પક્ષીઓનું ઘર. અંત: ઝાડ વાવો અને બચાવો.',ar:''},
      {q:'મારા દાદા-દાદી (My grandparents) — Plan: તેઓ કોણ છે? · તમારી સાથે શું કરે છે? · તેમની પાસેથી શું શીખો છો?',a:'શરૂઆત: મારા દાદા-દાદીનો પરિચય. મુદ્દા: વાર્તાઓ, ફરવા જવું, ગુજરાતી શીખવવું, પ્રેમ. અંત: તેઓ મને કેમ વહાલા છે.',ar:''},
      {q:'મારું પ્રિય પુસ્તક (My favourite book) — Plan: કયું પુસ્તક? · શેના વિશે છે? · શું શીખવા મળ્યું?',a:'શરૂઆત: પુસ્તકનું નામ. મુદ્દા: વાર્તા ટૂંકમાં, પ્રિય પાત્ર, ગમતો ભાગ. અંત: બીજાને કેમ વાંચવા કહીશ.',ar:''},
      {q:'વરસાદી દિવસ (A rainy day) — Plan: આકાશ કેવું? · લોકો શું કરે? · તમને શું ગમે?',a:'શરૂઆત: વરસાદ ક્યારે આવ્યો. મુદ્દા: વાદળ, વીજળી, પાણી, હોડી, ભજિયાં-ચા, ખેડૂતની ખુશી. અંત: વરસાદ કેમ ગમે છે.',ar:''}]},
  letter:{title:'પત્રલેખન — Letter writing',long:true,
    tips:'<h4>Personal letter format</h4><p>1. ઉપર જમણે: તમારું ગામ/શહેર અને તારીખ. 2. સંબોધન: પ્રિય / પૂજ્ય + name. 3. પહેલી લીટી: ખબરઅંતર (કેમ છો?). 4. મુખ્ય વાત 3–5 વાક્યમાં. 5. અંત: તમારો/તમારી + તમારું નામ.</p><h4>Formal letter</h4><p>ઉપર: તારીખ, પ્રતિ (to whom), વિષય (subject) — પછી માનનીય શ્રી થી શરૂ કરો, ટૂંકમાં વાત કરો, અંતે આપનો વિશ્વાસુ + નામ.</p>',
    models:[
      {t:'અંગત પત્ર — દાદીમાને · Personal letter to grandmother',g:'ન્યૂયોર્ક, તા. ૧૫ જૂન\n\nપૂજ્ય દાદીમા,\nસાદર પ્રણામ. અમે અહીં બધાં મજામાં છીએ. આશા છે કે તમે પણ મજામાં હશો. મેં આ વર્ષે ગુજરાતી શીખવાનું શરૂ કર્યું છે. હવે હું ગુજરાતી વાંચી અને લખી શકું છું. ઉનાળાની રજામાં અમે ભારત આવવાનાં છીએ. ત્યારે હું તમારી સાથે ગુજરાતીમાં જ વાત કરીશ. મમ્મી-પપ્પા તમને પ્રણામ કહે છે.\nતમારી વહાલી પૌત્રી,\nકિયારા',m:'New York, 15 June. Dear Grandmother, respectful pranam. We are all well here and hope you are too. This year I started learning Gujarati — I can now read and write it. In summer vacation we are coming to India, and then I will speak with you only in Gujarati. Mummy-Pappa send their pranam. Your loving granddaughter, Suhagi.'},
      {t:'ઔપચારિક પત્ર — રજા માટે અરજી · Formal leave application',g:'તા. ૧૦ જુલાઈ\nપ્રતિ, આચાર્યશ્રી, જ્ઞાનદીપ શાળા\nવિષય: બે દિવસની રજા બાબત\n\nમાનનીય શ્રી,\nસવિનય જણાવવાનું કે મારે મારા પરિવાર સાથે એક ધાર્મિક પ્રસંગમાં જવાનું હોવાથી હું તા. ૧૨ અને ૧૩ જુલાઈના રોજ શાળાએ આવી શકીશ નહીં. તો મને બે દિવસની રજા આપવા વિનંતી છે. હું રજા દરમિયાનનો અભ્યાસ પૂરો કરી લઈશ.\nઆપની વિશ્વાસુ,\nસુફી, ધોરણ ૭',m:'10 July. To the Principal, Gyandeep School. Subject: two days leave. Respected sir, I humbly inform that I must attend a family religious function, so I cannot attend school on 12–13 July. Kindly grant me two days leave; I will complete the missed studies. Yours faithfully, Suhana, Std 7.'}],
    prompts:[
      {q:'મિત્રને પત્ર — તમારી નવી શાળા વિશે લખો. (Write to a friend about your new school.)',a:'મુદ્દા: સ્થળ-તારીખ → પ્રિય મિત્ર → ખબરઅંતર → નવી શાળા કેવી છે (મકાન, શિક્ષકો, મિત્રો) → મળવા બોલાવો → તારો મિત્ર/તારી બહેનપણી + નામ.',ar:''},
      {q:'દાદાજીને પત્ર — દિવાળીની શુભેચ્છા આપો. (Diwali wishes to grandfather.)',a:'મુદ્દા: પ્રણામ → દિવાળીની શુભકામના → તમે શું કર્યું (દીવા, રંગોળી, મીઠાઈ) → તેમની તબિયત પૂછો → અંત.',ar:''},
      {q:'આચાર્યને અરજી — પુસ્તકાલયમાં ગુજરાતી પુસ્તકો વધારવા વિનંતી. (Request the principal for more Gujarati books.)',a:'મુદ્દા: તારીખ-પ્રતિ-વિષય → માનનીય શ્રી → કારણ (ગુજરાતી શીખનારા વિદ્યાર્થીઓ) → વિનંતી → આપનો વિશ્વાસુ.',ar:''}]},
  story:{title:'વાર્તાલેખન — Write your own story',long:true,
    tips:'<h4>Story recipe</h4><p><b>પાત્ર</b> (character) + <b>જગ્યા</b> (place) + <b>મુશ્કેલી</b> (problem) + <b>ઉકેલ</b> (solution) + <b>બોધ</b> (moral).</p><p>Short story = 5–7 sentences. Medium story = 10–15 sentences with a twist in the middle. Start with એક હતો/હતી… and end with the moral.</p>',
    models:[
      {t:'નમૂનો — ટૂંકી વાર્તા: બે બકરીઓ',g:'એક નાળા પર સાંકડો પુલ હતો. એક દિવસ બે બકરીઓ સામસામેથી પુલ પર આવી. પુલ એટલો સાંકડો હતો કે એક જ જઈ શકે. બંને જીદે ચડી: "પહેલી હું જઈશ!" કોઈ પાછળ ન હટી. બંને લડવા લાગી અને બંને પાણીમાં પડી ગઈ. બોધ: જીદ કરવાથી નુકસાન થાય છે.',m:'Two goats met on a narrow bridge. Neither would step back — "I go first!" They fought and both fell in the water. Moral: stubbornness causes loss.'}],
    prompts:[
      {q:'ટૂંકી વાર્તા લખો (5–7 વાક્ય) — વિષય: "ખોવાયેલું કુરકુરિયું" (The lost puppy)',a:'મદદ: કુરકુરિયું ક્યાં ખોવાયું? કોણે જોયું? તેણે શું કર્યું? ઘર કેવી રીતે મળ્યું? બોધ: દયા.',ar:''},
      {q:'ટૂંકી વાર્તા લખો — વિષય: "જાદુઈ પેન્સિલ" (The magic pencil)',a:'મદદ: પેન્સિલ ક્યાંથી મળી? તે શું દોરે તો સાચું થાય? છોકરીએ શું દોર્યું? છેલ્લે શું શીખી?',ar:''},
      {q:'ટૂંકી વાર્તા લખો — વિષય: "વરસાદમાં ફસાયેલી બિલાડી" (The cat stuck in rain)',a:'મદદ: બિલાડી ક્યાં ફસાઈ? કોણે બચાવી? પછી શું થયું? બોધ: મદદ.',ar:''},
      {q:'મધ્યમ વાર્તા લખો (10–15 વાક્ય) — વિષય: "શાળાની સ્પર્ધા" (The school competition)',a:'મદદ: કઈ સ્પર્ધા? કોણ ભાગ લે છે? વચ્ચે કઈ મુશ્કેલી આવી? અંતે શું થયું — જીત કે શીખ? બોધ: મહેનત.',ar:''},

    models:[
      {t:'મૂળ ફકરો (90 શબ્દ) → સંક્ષેપ (30 શબ્દ)',g:'મૂળ: ઝાડ આપણા સાચા મિત્રો છે. તે આપણને શ્વાસ લેવા માટે શુદ્ધ હવા આપે છે. તે ઉનાળાના તાપમાં ઠંડો છાંયો આપે છે. તેનાં ફળ આપણે ખાઈએ છીએ અને ફૂલોથી ઘર શણગારીએ છીએ. ઝાડ પર પક્ષીઓ માળા બાંધે છે. ઝાડ વરસાદ લાવવામાં પણ મદદ કરે છે. ઝાડ કાપવાથી ધરતી ગરમ થાય છે અને વરસાદ ઘટે છે. માટે આપણે ઝાડ કાપવાં ન જોઈએ. આપણે દર વર્ષે નવાં ઝાડ વાવવાં જોઈએ અને તેમની સંભાળ રાખવી જોઈએ.\n\nસંક્ષેપ: ઝાડ હવા, છાંયો, ફળ અને વરસાદ આપતા આપણા મિત્રો છે; પક્ષીઓનું ઘર છે. ઝાડ કાપવાથી નુકસાન થાય, માટે ઝાડ વાવવાં અને સાચવવાં જોઈએ.',m:'Original (90 words) about trees giving air, shade, fruit, rain, homes for birds — and the harm of cutting them. Précis (30 words): Trees are our friends giving air, shade, fruit and rain; homes for birds. Cutting them harms us, so plant and protect trees.'}],

function moduleData(m){ return m.ds ? DATASETS[m.ds] : []; }
function moduleItemCount(m){
  if(m.type==='letters'||m.type==='vocab') return moduleData(m).length;
  if(m.type==='barakhadi') return BCONS.length;
  if(m.type==='story') return m.sk.reduce((a,k)=>a+STORIES[k].qs.length,0);
  if(m.type==='exam') return 1;
  if(m.type==='states') return STATES.length;
  return 1;
}

/* =========================================================
   5) HOME (graded ધોરણ 1–10)
   ========================================================= */
function modProgress(m){
  const p=prog()[m.id]||{};
  const total=moduleItemCount(m);
  if(m.type==='concept'||m.type==='grammar') return p.done?100:0;
  const seen=p.seen?Object.keys(p.seen).length:0;
  let pct=Math.round(100*Math.min(seen,total)/total);
  if(p.done) pct=100;
  return pct;
}
function renderHome(){
  const learner=CURRENT&&(CURRENT.role==='learner'||PARENT_LEARN);
  let totalPct=0;
  MODULES.forEach(m=>totalPct+=modProgress(m));
  totalPct=Math.round(totalPct/MODULES.length);
  let h=`<div class="hero"><div class="big">ગ</div>
    <h1>શીખો <em>ગુજરાતી</em>${learner?', '+CURRENT.name:''}</h1>
    <p>The full course — ધોરણ 1 to ધોરણ 10. Script, બારાખડી, numbers to 1,000, hundreds of words, grammar and real speaking. Work down the grades in order.</p>
    <div class="meta">
      <span class="chip"><b>${MODULES.length}</b> lessons</span>
      <span class="chip"><b>10</b> ધોરણ · grades</span>
      ${learner?`<span class="chip">Your progress: <b>${totalPct}%</b></span><span class="chip">⭐ <b>${DB.pts||0}</b> pts · Level ${level()}</span><span class="chip">🎁 next chest in ${toNext()} ⭐</span>${DB.streak?`<span class="chip">🔥 ${DB.streak}-day streak</span>`:''}`:''}
    </div>
    ${learner?`<div class="meta" style="margin-top:10px">
      ${DB.lastMod&&MODULES.find(x=>x.id===DB.lastMod)?`<button class="btn small" onclick="openModule('${DB.lastMod}')">▶ Continue: ${MODULES.find(x=>x.id===DB.lastMod).title}</button>`:''}
      <button class="btn small" style="background:var(--gold,#F3A52E);border-color:var(--gold,#F3A52E)" onclick="dcStart()">⚡ Daily 10 challenge (+10 ⭐)</button>`:''}
      <span class="chip">${CLOUD_ON?'☁️ Progress syncs online':'Progress saves on this device'}</span>
      ${PARENT_LEARN?`<span class="chip" onclick="backToDash()" style="cursor:pointer">↩ Back to dashboard</span>`:''}
    </div></div>`;
  for(let s=1;s<=10;s++){
    const mods=MODULES.filter(m=>m.std===s);
    if(!mods.length) continue;
    h+=`<div class="std-block"><div class="std-head"><span class="n">ધોરણ ${s}</span><h2>${STD_TITLES[s]}</h2><span class="rule"></span></div><div class="modules">`;
    mods.forEach(m=>{
      const pct=modProgress(m);
      h+=`<button class="mod${pct===100?' complete':''}" onclick="openModule('${m.id}')">
        <span class="done-badge">✓</span>
        <div class="tag">${m.sub}</div>
        <div class="glyphset">${m.glyph}</div>
        <h3>${m.title}</h3><p>${m.intro}</p>
        <div class="foot"><div class="pbar"><i style="width:${pct}%"></i></div><span class="pct">${pct}%</span></div>
      </button>`;
    });
    h+=`</div></div>`;
  }
  h+=`<p class="footer-note">Sheekho Gujarati · made with love for Kabir, Kiara, Kahir, Sheel, Shaya &amp; Sufi</p>`;
  document.getElementById('home').innerHTML=h;
}
let PARENT_LEARN=false;
function parentTryCourse(){ PARENT_LEARN=true; document.getElementById('parentDash').style.display='none'; document.getElementById('home').style.display='block'; renderHome(); window.scrollTo({top:0}); }
function backToDash(){ PARENT_LEARN=false; goHome(); }
function goHome(){
  document.getElementById('lesson').classList.remove('active');
  if(CURRENT&&CURRENT.role==='parent'&&!PARENT_LEARN){
    document.getElementById('home').style.display='none';
    document.getElementById('parentDash').style.display='block';
    renderParentDashboard();
  }else{
    document.getElementById('parentDash').style.display='none';
    document.getElementById('home').style.display='block';
    renderHome();
  }
  window.scrollTo({top:0});
}
